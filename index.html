<!DOCTYPE html>

<head>

<style>
.quiz-switcher{display:flex;justify-content:center;gap:10px;padding:10px 16px;background:#0e3d5e;}
.quiz-switcher button{padding:7px 22px;border:2px solid rgba(255,255,255,0.5);background:transparent;color:white;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.quiz-switcher button.qs-active{background:white;color:#1a5276;border-color:white;}
</style>
<style>
  :root {
    --primary: #1a5276;
    --accent: #2e86c1;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bg: #f0f4f8;

    --muted: #6b7280;
    --border: #d1d5db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 20px 24px;
    text-align: center;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  header p { font-size: 0.85rem; opacity: 0.85; }
  .progress-bar-wrap {
    background: #ccc;
    height: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 6px;
    transition: width 0.3s;
  }
  .container { max-width: 780px; margin: 0 auto; padding: 24px 16px 80px; }

  /* Topic nav */
  .topic-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .topic-btn {
    padding: 6px 12px;
    font-size: 0.75rem;
    border: 2px solid var(--border);
    background: white;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .topic-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .topic-btn.done { border-color: var(--correct); color: var(--correct); }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    font-size: 0.9rem;
  }
  .score-bar span b { color: var(--accent); }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 2px solid transparent;
    transition: border 0.2s;
  }
  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong { border-color: var(--wrong); }

  .question-meta {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-size: 0.92rem;
    text-align: left;
    line-height: 1.4;
    transition: all 0.15s;
    color: var(--text);
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #eaf3fb; }
  .option-btn .letter {
    font-weight: 700;
    color: var(--accent);
    min-width: 18px;
  }
  .option-btn.correct {
    background: #d4efdf;
    border-color: var(--correct);
    color: var(--correct);
    font-weight: 600;
  }
  .option-btn.wrong {
    background: #fadbd8;
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 14px;
    padding: 12px 16px;
    background: #eaf3fb;
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }
  .explanation.show { display: block; }

  /* Correction menu */
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-header .question-meta { flex: 1; }
  .menu-btn {
    background: none; border: none; cursor: pointer; font-size: 1.2rem;
    color: var(--muted); padding: 0 4px; line-height: 1; border-radius: 6px;
    transition: background 0.15s; flex-shrink: 0;
  }
  .menu-btn:hover { background: #e5e7eb; color: var(--text); }
  .correction-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .correction-overlay.open { display: flex; }
  .correction-box {
    background: white; border-radius: 16px; padding: 24px; width: 320px;
    max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .correction-box h3 { font-size: 0.95rem; color: var(--primary); margin-bottom: 6px; }
  .correction-box p { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; line-height: 1.4; }
  .correction-opts { display: flex; flex-direction: column; gap: 8px; }
  .correction-opt {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border: 2px solid var(--border); border-radius: 10px; cursor: pointer;
    font-size: 0.88rem; background: white; text-align: left; transition: all 0.15s;
  }
  .correction-opt:hover { border-color: var(--accent); background: #eaf3fb; }
  .correction-opt.current-correct { border-color: var(--correct); background: #d4efdf; color: var(--correct); font-weight: 600; }
  .correction-opt .opt-letter { font-weight: 700; color: var(--accent); min-width: 18px; }
  .correction-opt.current-correct .opt-letter { color: var(--correct); }
  .correction-cancel { margin-top: 12px; width: 100%; padding: 9px; border: none; background: #f3f4f6; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--muted); }
  .correction-cancel:hover { background: #e5e7eb; }

  /* Final screen */
  #final-screen {
    display: none;
    text-align: center;
    background: white;
    border-radius: 16px;
    padding: 40px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  #final-screen h2 { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
  #final-screen .big-score { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin: 16px 0; }
  #final-screen p { color: var(--muted); margin-bottom: 20px; }
  .topic-results { text-align: left; margin-top: 24px; }
  .topic-result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 0.88rem;
    background: #f8f9fa;
  }
  .topic-result-row .mini-bar-wrap {
    width: 120px;
    background: #e0e0e0;
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .topic-result-row .mini-bar { height: 8px; border-radius: 10px; background: var(--accent); }

  .btn-restart {
    margin-top: 24px;
    padding: 14px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: var(--accent); }
  .hidden { display: none; }
</style>

<body>

<header>
  <h1>🏥 Quiz Neonatología 2025 – Hospital Altagracia</h1>
  <p>Concurso Subespecialidad de Neonatología · 120 preguntas · 12 temas</p>
</header>
<div class="quiz-switcher">
  <button id="btn-q1" class="qs-active" onclick="switchQuiz(1)">📋 Quiz 1</button>
  <button id="btn-q2" onclick="switchQuiz(2)">📋 Quiz 2</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="pbar"></div></div>

<!-- Correction modal -->
<div class="correction-overlay" id="correction-overlay" onclick="closeCorrection(event)">
  <div class="correction-box">
    <h3>✏️ Corregir respuesta correcta</h3>
    <p id="correction-question-preview"></p>
    <div class="correction-opts" id="correction-opts"></div>
    <button class="correction-cancel" onclick="closeCorrection()">Cancelar</button>
  </div>
</div>

<div class="container">
  <div class="score-bar">
    <span>Pregunta <b id="q-current">1</b> / <b id="q-total">120</b></span>
    <span>Correctas: <b id="score-count">0</b> | Incorrectas: <b id="wrong-count">0</b></span>
  </div>

  <div class="topic-nav" id="topic-nav"></div>

  <div id="quiz-body"></div>

  <div id="final-screen">
    <h2>¡Simulacro completado!</h2>
    <div class="big-score" id="final-pct">--%</div>
    <p id="final-msg"></p>
    <div class="topic-results" id="topic-results"></div>
    <button class="btn-restart" onclick="restart()">🔄 Volver a empezar</button>
  </div>
</div>

<script>
const topics = [
  "Recién Nacido Normal",
  "Asistencia Inmediata al RN",
  "Trastornos Metabólicos",
  "Diabetes Gestacional / HMD",
  "Valoración y Edad Gestacional",
  "Prematuridad",
  "Síndrome de Distrés Respiratorio",
  "Restricción de Crecimiento Intrauterino",
  "Recién Nacido Bajo Peso",
  "Lactancia Materna",
  "Sepsis Neonatal",
  "Reanimación Neonatal"
];

const questions1 = [
// ============================================================
// TEMA 1: RECIÉN NACIDO NORMAL (10 preguntas)
// ============================================================
{
  topic: 0,
  q: "¿Cuál es la frecuencia cardíaca normal en un recién nacido a término en reposo?",
  opts: ["60-80 lpm","100-160 lpm","170-200 lpm","80-100 lpm"],
  ans: 1,
  exp: "La FC normal del RN a término en reposo es 100-160 lpm. Valores <100 se consideran bradicardia neonatal."
},
{
  topic: 0,
  q: "¿Cuál es la temperatura axilar normal de un recién nacido?",
  opts: ["35.0–36.0 °C","36.5–37.5 °C","37.5–38.5 °C","34.0–35.5 °C"],
  ans: 1,
  exp: "La temperatura axilar normal del RN es 36.5–37.5 °C. La hipotermia se define como <36.5 °C y la hipertermia como >37.5 °C."
},
{
  topic: 0,
  q: "El vérnix caseosa en el recién nacido normal cumple principalmente la función de:",
  opts: ["Indicar madurez pulmonar","Proteger la piel del líquido amniótico","Estimular la producción de surfactante","Prevenir la sepsis por estreptococo grupo B"],
  ans: 1,
  exp: "El vérnix caseosa es una sustancia grasa que cubre la piel fetal y la protege de la maceración por el líquido amniótico. Tiene propiedades antimicrobianas y se recomienda no retirarlo inmediatamente al nacer."
},
{
  topic: 0,
  q: "La pérdida de peso fisiológica esperada en el recién nacido a término durante los primeros días de vida es:",
  opts: ["1-3% del peso al nacer","5-10% del peso al nacer","12-15% del peso al nacer","15-20% del peso al nacer"],
  ans: 1,
  exp: "La pérdida fisiológica de peso es del 5-10% del peso al nacer en los primeros 3-5 días, recuperándose para el día 10-14. Pérdidas >10% requieren evaluación."
},
{
  topic: 0,
  q: "¿Cuál es la frecuencia respiratoria normal en el recién nacido?",
  opts: ["10-20 rpm","20-30 rpm","40-60 rpm","70-90 rpm"],
  ans: 2,
  exp: "La FR normal del RN es 40-60 respiraciones por minuto. Taquipnea se define como FR >60 rpm sostenida."
},
{
  topic: 0,
  q: "El período de transición neonatal normal dura aproximadamente:",
  opts: ["30 minutos","6-8 horas","24-48 horas","5-7 días"],
  ans: 1,
  exp: "El período de transición neonatal (adaptación cardiopulmonar) dura 6-8 horas. Durante este tiempo el RN pasa por fases de reactividad, sueño y segundo período reactivo."
},
{
  topic: 0,
  q: "¿Cuál es el signo de Moro y qué evalúa?",
  opts: ["Extensión de miembros inferiores; evalúa tono muscular","Abducción y extensión de brazos seguida de flexión; evalúa integridad del SNC","Flexión plantar al estimular la palma; evalúa reflejos primitivos","Rotación de cabeza hacia el estímulo táctil; evalúa reflejo de búsqueda"],
  ans: 1,
  exp: "El reflejo de Moro consiste en extensión y abducción de los brazos seguida de su flexión ante un estímulo brusco. Evalúa la integridad del SNC y está presente hasta los 4-6 meses."
},
{
  topic: 0,
  q: "En el recién nacido normal a término, el primer meconio debe eliminarse dentro de las primeras:",
  opts: ["6 horas","24-48 horas","72 horas","5 días"],
  ans: 1,
  exp: "El 95% de los RN a término elimina meconio en las primeras 24 horas y el 99% en las primeras 48 horas. Su ausencia obliga a descartar obstrucción intestinal o fibrosis quística."
},
{
  topic: 0,
  q: "La ictericia fisiológica neonatal en el RN a término aparece típicamente:",
  opts: ["En las primeras 24 horas","Entre las 24-72 horas de vida","A los 7-10 días de vida","Después de las 2 semanas"],
  ans: 1,
  exp: "La ictericia fisiológica aparece después de las 24 horas, alcanza su pico alrededor del 3er-5to día y desaparece antes de los 14 días en el RN a término."
},
{
  topic: 0,
  q: "¿Cuánto mide y cuánto pesa un recién nacido normal a término?",
  opts: ["Peso: 1500-2000 g; talla: 40-44 cm","Peso: 2500-4000 g; talla: 48-52 cm","Peso: 4000-4500 g; talla: 53-56 cm","Peso: 2000-2500 g; talla: 44-48 cm"],
  ans: 1,
  exp: "El RN a término normal pesa entre 2500-4000 g y mide 48-52 cm. PC 33-35 cm. Perímetro torácico 30-33 cm."
},
// ============================================================
// TEMA 2: ASISTENCIA INMEDIATA AL RECIÉN NACIDO (10 preguntas)
// ============================================================
{
  topic: 1,
  q: "Inmediatamente al nacer, ¿cuál es la primera acción a realizar en la sala de partos según el programa de reanimación neonatal?",
  opts: ["Pinzar el cordón umbilical inmediatamente","Evaluar: ¿A término? ¿Llora o respira? ¿Buen tono muscular?","Aspirar secreciones de boca y nariz","Administrar vitamina K"],
  ans: 1,
  exp: "Según el NRP/AAP, la primera acción es responder las 3 preguntas: ¿Es a término? ¿Tiene llanto o respiración? ¿Buen tono muscular? Si las 3 son sí, se procede a cuidados de rutina."
},
{
  topic: 1,
  q: "¿Cuál es la temperatura recomendada en la sala de partos para recibir al recién nacido?",
  opts: ["20-22 °C","23-25 °C","25-28 °C","28-32 °C"],
  ans: 1,
  exp: "La sala de partos debe mantenerse a 23-25 °C para minimizar la pérdida de calor del RN. Para prematuros <28 sem se recomienda temperatura ambiental de 26 °C o más."
},
{
  topic: 1,
  q: "El pinzamiento tardío del cordón umbilical en RN a término se recomienda a:",
  opts: ["30-60 segundos después del nacimiento","Al menos 1 minuto (preferiblemente 1-3 minutos)","5-10 minutos después del nacimiento","Después de que el cordón deje de latir completamente"],
  ans: 1,
  exp: "La OMS y AAP recomiendan el pinzamiento tardío del cordón a 1-3 minutos en RN a término y pretérmino vigoroso, lo que aumenta la hemoglobina, el hierro y reduce la anemia neonatal."
},
{
  topic: 1,
  q: "Para la profilaxis ocular del recién nacido contra Neisseria gonorrhoeae, el agente de elección según las guías actuales es:",
  opts: ["Nitrato de plata al 1%","Eritromicina en ungüento al 0.5%","Ciprofloxacino en gotas al 0.3%","Gentamicina en ungüento al 0.3%"],
  ans: 1,
  exp: "La eritromicina en ungüento oftálmico al 0.5% es el agente recomendado para profilaxis de oftalmía neonatal gonocócica. El nitrato de plata fue retirado por sus efectos irritantes."
},
{
  topic: 1,
  q: "La vitamina K1 (fitomenadiona) se administra al recién nacido principalmente para prevenir:",
  opts: ["La hipoglucemia neonatal","La enfermedad hemorrágica del recién nacido","La sepsis neonatal temprana","La anemia fisiológica"],
  ans: 1,
  exp: "La vitamina K1 (0.5-1 mg IM) previene la Enfermedad Hemorrágica del Recién Nacido (deficiencia de vitamina K), que puede causar sangrado intracraneal grave entre los 2-12 semanas de vida."
},
{
  topic: 1,
  q: "La vacuna de Hepatitis B debe administrarse al recién nacido idealmente:",
  opts: ["Al mes de vida","A los 2 meses","En las primeras 12-24 horas de vida","A los 6 meses"],
  ans: 2,
  exp: "La primera dosis de vacuna HBV debe aplicarse en las primeras 12-24 horas de vida en todos los RN. En hijos de madres HBsAg positivo debe administrarse en las primeras 12 horas junto con inmunoglobulina anti-HBV."
},
{
  topic: 1,
  q: "¿Qué establece la prueba del tamiz neonatal (Newborn Screening)?",
  opts: ["Se realiza únicamente si hay antecedentes familiares de errores metabólicos","Se toma muestra de sangre del talón entre las 24-72 horas de vida","Debe realizarse antes de las 12 horas de vida para mayor sensibilidad","Solo se realiza en recién nacidos prematuros"],
  ans: 1,
  exp: "El tamiz neonatal se realiza entre 24-72 horas de vida (idealmente después de 24h de alimentación proteica). Detecta hipotiroidismo congénito, PKU, hiperplasia suprarrenal congénita, entre otros."
},
{
  topic: 1,
  q: "En la atención inmediata del recién nacido, el secado vigoroso sirve principalmente para:",
  opts: ["Evaluar el reflejo de Moro","Proporcionar estimulación táctil y prevenir hipotermia","Eliminar el vérnix caseosa","Estimular el reflejo de succión"],
  ans: 1,
  exp: "El secado vigoroso previene la hipotermia (principal causa de mortalidad neonatal prevenible) y sirve como estimulación táctil para iniciar la respiración. Se realiza en los primeros 30 segundos."
},
{
  topic: 1,
  q: "¿Cuál es la temperatura del ambiente ideal para bañar a un recién nacido a término en las primeras horas de vida?",
  opts: ["Se recomienda bañar inmediatamente para prevenir hipotermia","El baño debe diferirse hasta que la temperatura sea ≥36.5°C y estabilidad hemodinámica","El baño de rutina se realiza a las 2 horas independientemente de la temperatura","El baño se realiza siempre en la sala de partos"],
  ans: 1,
  exp: "La OMS recomienda diferir el primer baño hasta que el RN tenga temperatura estable ≥36.5°C (mínimo 6 horas). El baño temprano aumenta el riesgo de hipotermia e hipoglucemia."
},
{
  topic: 1,
  q: "El contacto piel a piel (Método Canguro) inmediatamente después del parto en un RN a término vigoroso:",
  opts: ["Está contraindicado por riesgo de hipotermia","Promueve lactancia, estabilidad térmica y vínculo materno-neonatal","Se reserva para prematuros menores de 34 semanas","Debe diferirse hasta completar todos los procedimientos de rutina"],
  ans: 1,
  exp: "El contacto piel a piel inmediato promueve la lactancia materna, estabilidad térmica, cardiorrespiratoria y glucémica, y fortalece el vínculo. Está recomendado por OMS/AAP para todos los RN estables."
},
// ============================================================
// TEMA 3: TRASTORNOS METABÓLICOS (10 preguntas)
// ============================================================
{
  topic: 2,
  q: "Se define hipoglucemia neonatal sintomática cuando la glucosa plasmática es menor de:",
  opts: ["<30 mg/dL en cualquier RN","<45 mg/dL en las primeras 24 horas en RN de riesgo","<60 mg/dL en todo recién nacido","<50 mg/dL solo en prematuros"],
  ans: 1,
  exp: "Aunque el umbral exacto es debatido, la AAP y NeoFax definen hipoglucemia operacional en <45 mg/dL en las primeras 24 h en RN de riesgo. El objetivo es mantener glucosa ≥45 mg/dL en las primeras 48h y ≥50 mg/dL después."
},
{
  topic: 2,
  q: "¿Cuáles son los signos clínicos de hipoglucemia neonatal?",
  opts: ["Ictericia, hepatomegalia y coluria","Temblores, cianosis, apnea, hipotonía, convulsiones y letargia","Fiebre, distensión abdominal y sangre en heces","Petequias, hepatoesplenomegalia y trombocitopenia"],
  ans: 1,
  exp: "Los signos de hipoglucemia incluyen temblores/jitteriness, cianosis, apneas, hipotonía, convulsiones y letargia. Son inespecíficos, por lo que se debe confirmar con glucometría."
},
{
  topic: 2,
  q: "La hipocalcemia neonatal precoz (primeras 72 horas) se define como calcio total sérico menor de:",
  opts: ["<7 mg/dL en RN a término","<8 mg/dL en RN prematuro","A: <7 mg/dL a término / <6.5 mg/dL en prematuro","<5 mg/dL en cualquier RN"],
  ans: 2,
  exp: "Hipocalcemia: Ca total <7 mg/dL (o Ca iónico <4 mg/dL) en RN a término; <6.5-7 mg/dL en prematuros. Factores de riesgo: prematurez, asfixia, hijo de madre diabética, hipomagnesemia."
},
{
  topic: 2,
  q: "El recién nacido hijo de madre con hiperparatiroidismo tiene riesgo de presentar:",
  opts: ["Hipercalcemia neonatal","Hipocalcemia neonatal por supresión de PTH fetal","Hiperfosfatemia e hipercalcemia","Hipomagnesemia grave"],
  ans: 1,
  exp: "La hipercalcemia materna (hiperparatiroidismo) suprime la PTH fetal y estimula calcitonina, resultando en hipocalcemia neonatal. Es una causa clásica de hipocalcemia tardía."
},
{
  topic: 2,
  q: "¿Cuál es el tratamiento de emergencia para convulsiones por hipocalcemia neonatal?",
  opts: ["Gluconato de calcio al 10% IV 200 mg/kg en bolo rápido","Gluconato de calcio al 10% IV 100-200 mg/kg (1-2 mL/kg) lento en 10 minutos con monitoreo cardíaco","Cloruro de calcio IV 0.5 mL/kg en bolo","Carbonato de calcio oral 500 mg cada 8h"],
  ans: 1,
  exp: "Para hipocalcemia sintomática (convulsiones): Gluconato de calcio 10%, 100-200 mg/kg IV lento (10 min) con monitoreo ECG. La administración rápida puede causar bradicardia grave. Evitar extravasación (necrosis tisular)."
},

{topic:0,q:"El meconio que elimina el recién nacido en las primeras 24–48 horas está compuesto principalmente de:",opts:["Bacterias intestinales, bilis y sangre fetal","Células epiteliales descamadas, líquido amniótico, bilis, moco y lanugo","Sangre materna y proteínas séricas","Grasa subcutánea y glucógeno"],ans:1,exp:"El meconio está formado por células epiteliales descamadas, líquido amniótico deglutido, bilis, moco y lanugo. Es estéril, viscoso y de color verde-negro. La eliminación antes de las 24 h posnatales es fisiológica."},

{topic:0,q:"La descamación fisiológica del recién nacido a término aparece principalmente:",opts:["Antes de las 24 horas de vida","Entre el 2.° y 4.° día de vida","A los 2 meses de vida","Solo en prematuros tardíos"],ans:1,exp:"La descamación fisiológica ocurre entre el 2.°–4.° día de vida, más prominente en palmas y plantas. Es normal y no requiere tratamiento. En el postérmino es más intensa. La descamación al nacer puede indicar postmadurez."},

{topic:1,q:"¿Cuándo está indicada la aspiración de la vía aérea durante la atención inmediata del RN?",opts:["Rutinariamente en todos los RN al nacer","Solo cuando hay obstrucción evidente de vía aérea o el RN no responde a los pasos iniciales","En todos los RN con líquido amniótico meconial","Siempre antes de la primera respiración espontánea"],ans:1,exp:"La aspiración rutinaria fue eliminada del NRP 2020. Se aspira SOLO si hay obstrucción de vía aérea evidente. La aspiración agresiva puede causar bradicardia vagal. Si hay LAM y el RN está deprimido, se puede aspirar la traquea con laringoscopio."},
{topic:1,q:"¿Cuál es el objetivo de SpO2 preductal al minuto 1 de vida según el NRP 2020?",opts:["60–65%","85–95%","98–100%","40–60%"],ans:0,exp:"Objetivos de SpO2 preductal NRP 2020: 1 min: 60–65%; 2 min: 65–70%; 3 min: 70–75%; 4 min: 75–80%; 5 min: 80–85%; 10 min: 85–95%. La cianosis central puede ser normal hasta los 5–10 minutos de vida."},
{topic:1,q:"¿Cuál es la dosis de vitamina K1 (fitomenadiona) en el recién nacido?",opts:["0.1 mg IM dosis única","0.5–1 mg IM (0.5 mg si <1500 g; 1 mg si ≥1500 g)","2 mg IV en bolo lento","5 mg VO en los primeros 3 días"],ans:1,exp:"Vitamina K1: 0.5 mg IM en RN <1500 g; 1 mg IM en RN ≥1500 g, dosis única en las primeras 6 horas de vida. La vía IM es la única que garantiza profilaxis completa de la enfermedad hemorrágica tardía."},
{topic:1,q:"El tamiz neonatal (cribado metabólico) incluye obligatoriamente en la mayoría de programas:",opts:["Solo hipotiroidismo congénito","Hipotiroidismo congénito, PKU e hiperplasia suprarrenal congénita como mínimo","Solo enfermedades tratables con dieta especial","Únicamente enfermedades con incidencia >1/1000 nacidos"],ans:1,exp:"El panel mínimo recomendado incluye hipotiroidismo congénito, PKU e hiperplasia suprarrenal congénita. Muchos países incluyen >30 enfermedades mediante espectrometría de masas en tándem. La detección precoz previene daño irreversible."},
{topic:1,q:"¿Cuándo se debe iniciar el primer contacto piel a piel (KMC) en el RN a término vigoroso?",opts:["Después de completar todos los procedimientos de rutina (baño, peso, profilaxis)","Inmediatamente al nacer o en los primeros minutos, antes de los procedimientos de rutina","A las 2 horas de vida cuando la temperatura materna sea estable","Solo si la madre lo solicita explícitamente"],ans:1,exp:"El contacto piel a piel debe iniciarse inmediatamente o en los primeros minutos tras el nacimiento en RN vigoroso a término. Los procedimientos de rutina (peso, profilaxis) se difieren. La OMS lo recomienda como parte del cuidado esencial del RN."},
{topic:1,q:"La prueba de oximetría de pulso para detección de cardiopatías congénitas críticas (CCHD screening) se realiza:",opts:["Al nacer en sala de partos","Entre las 24–48 horas de vida antes del alta","A los 7 días de vida en el control ambulatorio","Solo si hay soplo cardíaco audible"],ans:1,exp:"El screening de CCHD con oximetría se realiza entre 24–48 h de vida, antes del alta hospitalaria. Se mide SpO2 en mano derecha (preductal) y pie (postductal). Positivo: SpO2 <95% en ambas o diferencia >3% entre sitios."},
{topic:1,q:"¿Cuál es la causa más frecuente de falla en la profilaxis ocular neonatal con eritromicina?",opts:["Resistencia bacteriana de N. gonorrhoeae a eritromicina","Aplicación tardía (>1 hora después del nacimiento)","Dosis insuficiente del ungüento","Incompatibilidad con el lubricante del canal de parto"],ans:1,exp:"La profilaxis ocular debe aplicarse dentro de la primera hora de nacimiento. La demora reduce su eficacia. Debe aplicarse en el saco conjuntival inferior de ambos ojos. No previene conjuntivitis por Chlamydia (requiere eritromicina sistémica)."},
{topic:1,q:"En el examen físico del recién nacido, ¿qué hallazgo requiere evaluación urgente?",opts:["Vérnix caseosa abundante en pliegues","Coloración azulada de manos y pies (acrocianosis)","Cianosis central persistente después de 10 minutos de vida","Mancha mongólica en región lumbosacra"],ans:2,exp:"La cianosis central (labios, mucosas, tronco) persistente después de 10 minutos es patológica. Puede indicar cardiopatía congénita cianosante, HPPN o falla respiratoria grave. Requiere evaluación y oximetría inmediata. La acrocianosis en manos/pies es normal en las primeras horas."},
{topic:1,q:"¿Cuál es el screening auditivo neonatal de primera línea?",opts:["Potenciales evocados auditivos del tronco encefálico (PEATC) en todos los RN","Otoemisiones acústicas (OEA) como primera línea, seguidas de PEATC si fallan","Audiometría conductual a los 3 meses","Solo para RN en UCIN con factores de riesgo"],ans:1,exp:"OEA (otoemisiones acústicas) es el método de primera línea por ser rápido, económico y no invasivo. Si falla: PEATC. Objetivo: diagnóstico antes de 3 meses e intervención antes de 6 meses. RN de UCIN deben hacerse PEATC directamente."},

{topic:2,q:"¿Cuáles son los factores de riesgo neonatales para hipoglucemia que requieren monitoreo obligatorio?",opts:["Solo prematuros <32 semanas","Prematuros tardíos, PEG, GEG, HMD, asfixia perinatal, eritroblastosis fetal, policitemia","Solo HMD y prematuros <28 semanas","RN con ictericia y peso >4000 g"],ans:1,exp:"Grupos de riesgo para hipoglucemia: prematuros tardíos (34–36 6/7), PEG (<P10), GEG/HMD, asfixia perinatal, policitemia, eritroblastosis, hipotermia y madre con betabloqueadores. Estos RN requieren glucometría en las primeras horas."},
{topic:2,q:"La hipermagnesemia neonatal secundaria a sulfato de magnesio materno se manifiesta con:",opts:["Convulsiones y taquicardia","Hipotonía, depresión respiratoria, hiporreflexia y dificultad para succionar","Hipoglucemia e hipercalcemia","Hiperbilirrubinemia grave en las primeras 24 h"],ans:1,exp:"El MgSO4 materno pasa al feto y causa hipermagnesemia neonatal: hipotonía severa, depresión respiratoria, hiporreflexia, dificultad para alimentar. Puede requerir soporte respiratorio. El gluconato de calcio IV puede revertir los efectos en casos graves."},
{topic:2,q:"El síndrome de Beckwith-Wiedemann se caracteriza por hipoglucemia neonatal y:",opts:["Microcefalia, labio leporino y cardiopatía","Macrosomía, macroglosia, onfalocele/hernia umbilical y visceromegalia","Hipotonía, cara característica y trisomía 21","Microstomía, mejillas prominentes y ojos almendrados"],ans:1,exp:"Beckwith-Wiedemann: hipoglucemia hiperinsulinémica (por hiperplasia de células β), macrosomía, macroglosia, defectos de pared abdominal (onfalocele), visceromegalia y pliegue auricular característico. Predispone a tumor de Wilms y hepatoblastoma."},
{topic:2,q:"La hipernatremia neonatal (Na >150 mEq/L) en la primera semana de vida se debe principalmente a:",opts:["Exceso de sodio en la nutrición parenteral","Pérdida de agua libre por aporte insuficiente de leche materna (deshidratación hipernatrémica)","Hiperaldosteronismo neonatal transitorio","Infusión de bicarbonato de sodio por acidosis"],ans:1,exp:"Deshidratación hipernatrémica por lactancia insuficiente es la causa más frecuente en RN a término. Ocurre en los primeros 3–7 días. Factores: primigestas, toma difícil, pérdida de peso >10%. Puede causar trombosis venosa cerebral y daño neurológico."},
{topic:2,q:"¿Cuándo se sospecha un error innato del metabolismo en el neonato?",opts:["Solo si hay antecedentes familiares de EIM","RN que tras período libre de síntomas presenta encefalopatía, acidosis metabólica, hipoglucemia refractaria u olor anormal","Solo en prematuros con sepsis no respondedora","En todo RN con ictericia que aparece en las primeras 24 h"],ans:1,exp:"Patrón clásico del EIM: RN normal al nacer → período libre de síntomas → encefalopatía progresiva, vómitos, acidosis metabólica, hipoglucemia, hiperamonemia u olor anormal. El diagnóstico requiere aminoácidos, ácidos orgánicos y amonio urgentes."},
{topic:2,q:"El déficit de biotinidasa (detectado en tamiz neonatal) produce:",opts:["Acumulación de fenilalanina con daño neurológico","Convulsiones, alopecia, dermatitis y ataxia, tratables con biotina oral","Hipoglucemia refractaria e hiperinsulinismo","Ictericia obstructiva y cirrosis en la infancia"],ans:1,exp:"Déficit de biotinidasa: acumulación de biotina no reciclada → déficit de carboxilasas. Manifestaciones: convulsiones, hipotonía, dermatitis, alopecia, ataxia. Tratable con biotina 5–10 mg/día VO. Detección por tamiz es esencial (tratamiento evita todas las secuelas)."},
{topic:2,q:"¿Cuál es el tratamiento de la hipoglucemia neonatal sintomática grave (glucosa <25 mg/dL con convulsiones)?",opts:["Alimentación oral urgente con fórmula hipercalórica","Bolo IV de dextrosa al 10% a 2 mL/kg (200 mg/kg) en 5 minutos + infusión continua de glucosa 6–8 mg/kg/min","Glucagón IM como única medida","Bolo de dextrosa al 50% a 1 mL/kg"],ans:1,exp:"Hipoglucemia grave: bolo D10% 2 mL/kg IV en 5 min → infusión continua 6–8 mg/kg/min. Nunca usar D50% (hiperosmolar, riesgo de necrosis tisular). El glucagón (0.02–0.2 mg/kg IM/IV) es una alternativa si no hay acceso IV. Meta: glucosa >45–50 mg/dL."},
{topic:2,q:"La acidemia propiónica es un error innato del metabolismo que afecta la degradación de:",opts:["Aminoácidos aromáticos (fenilalanina)","Aminoácidos ramificados (valina, isoleucina, metionina, treonina) → acumulación de propionato","Galactosa → acumulación de galactosa-1-P","Urea → hiperamonemia sin acidemia"],ans:1,exp:"Acidemia propiónica: déficit de propionil-CoA carboxilasa → acumulación de propionato. Manifestaciones neonatales: encefalopatía, hipotonía, vómitos, acidosis metabólica con anion gap elevado, ketosis e hiperamonemia. Tratamiento: dieta restringida en aminoácidos precursores."},
{topic:2,q:"La hipocalcemia neonatal tardía (>72 horas) se asocia frecuentemente a:",opts:["Prematurez extrema <28 semanas","Alimentación con fórmula con alta carga de fósforo (leche de vaca) → hiperfosfatemia → hipocalcemia","Hiperbilirrubinemia grave por incompatibilidad Rh","Uso de furosemida en prematuros"],ans:1,exp:"Hipocalcemia tardía (días 5–10): clásicamente por alimentación con leche de vaca entera o fórmula inadecuada con exceso de fósforo → hiperfosfatemia → hipocalcemia. También: hipomagnesemia, hipoparatiroidismo congénito, déficit de vitamina D materna."},
{topic:2,q:"La hiperfosfatemia neonatal puede provocar secundariamente:",opts:["Hiperglucemia e hiperinsulinismo","Hipocalcemia, tetania y convulsiones","Hipermagnesemia e hiperkalemia","Acidosis respiratoria severa"],ans:1,exp:"Hiperfosfatemia → formación de complejos calcio-fosfato → precipitación de calcio → hipocalcemia ionizada. Esto causa tetania, irritabilidad, convulsiones y apnea. El tratamiento incluye reducir el aporte de fósforo y suplementar calcio."},

{topic:3,q:"¿Cómo se diagnostica la diabetes gestacional según los criterios de la IADPSG (OMS 2013)?",opts:["Glucosa en ayunas >126 mg/dL en cualquier trimestre","Glucosa en ayunas ≥92 mg/dL, o 1h ≥180 mg/dL, o 2h ≥153 mg/dL en PTOG 75g entre sem 24–28","Solo por HbA1c >6.5% en el primer trimestre","Glucemia casual >200 mg/dL con síntomas"],ans:1,exp:"Criterios IADPSG/OMS para DG: PTOG 75g entre 24–28 sem. Un solo valor alterado es diagnóstico: ayunas ≥92 mg/dL, 1h ≥180 mg/dL o 2h ≥153 mg/dL. Detecta DG con menor umbral que los criterios Carpenter-Coustan."},
{topic:3,q:"¿Cuáles son las malformaciones del sistema nervioso central más frecuentes en hijos de madre con diabetes pregestacional mal controlada?",opts:["Hidrocefalia y agenesia del cuerpo calloso","Defectos del tubo neural (anencefalia, espina bífida) y holoprosencefalia","Porencefalia y quistes del plexo coroideo","Microcefalia aislada sin otras malformaciones"],ans:1,exp:"La hiperglucemia en el 1er trimestre (organogénesis) causa defectos del tubo neural (anencefalia, espina bífida), holoprosencefalia y otras malformaciones del SNC. Por eso el control glucémico preconcepcional es crucial (HbA1c <6.5%)."},
{topic:3,q:"El síndrome del colon izquierdo pequeño en el hijo de madre diabética se presenta con:",opts:["Diarrea explosiva y distensión abdominal grave","Estreñimiento, distensión abdominal y enema opaco con colon izquierdo de pequeño calibre, resuelve espontáneamente","Vólvulo intestinal que requiere cirugía urgente","Atresia colónica con calcificaciones"],ans:1,exp:"El colon izquierdo pequeño (Small left colon syndrome) es una causa de obstrucción intestinal transitoria en HMD. El enema opaco muestra colon izquierdo de pequeño calibre con zona de transición en el ángulo esplénico. Resuelve espontáneamente en días."},
{topic:3,q:"¿Cuál es la diferencia en riesgo de malformaciones congénitas entre diabetes gestacional y diabetes mellitus tipo 1 pregestacional?",opts:["La DG tiene mayor riesgo de malformaciones cardíacas que la DMT1","La DMT1 pregestacional tiene 3–5 veces más riesgo de malformaciones mayores vs población general; la DG tiene riesgo similar a la población general si se controla bien","Ambas tienen riesgo idéntico de malformaciones si la glucemia se controla en el 1er trimestre","La DG tiene mayor riesgo de DTN que la DMT1"],ans:1,exp:"DMT1 pregestacional mal controlada: riesgo de malformaciones 3–5 veces mayor (organogénesis en semanas 3–8 donde la hiperglucemia es teratogénica). DG diagnosticada en sem 24–28 NO afecta organogénesis (ya completada), por lo que el riesgo de malformaciones no aumenta."},
{topic:3,q:"La trombosis de vena renal en el hijo de madre diabética se asocia principalmente a:",opts:["Hipoglucemia grave y síndrome nefrótico","Policitemia e hiperviscosidad que aumenta el riesgo de trombosis","Déficit congénito de antitrombina III exclusivamente","Hipertensión renovascular materna"],ans:1,exp:"Trombosis de vena renal en HMD: la policitemia con hiperviscosidad predispone a trombosis. Clínica: masa renal palpable, hematuria y trombocitopenia. El eco-Doppler renal confirma el diagnóstico. Tratamiento: hidratación, anticoagulación en casos seleccionados."},
{topic:3,q:"¿Qué órganos son principalmente afectados por el hiperinsulinismo fetal en el hijo de madre diabética?",opts:["Cerebro y riñones exclusivamente","Hígado (glucógeno), músculo, tejido adiposo y corazón (hipertrofia)","Solo tejido adiposo subcutáneo","Glándulas suprarrenales y tiroides"],ans:1,exp:"El hiperinsulinismo estimula: 1) glucogenogénesis hepática (hepatomegalia), 2) lipogénesis (macrosomía con exceso graso), 3) captación muscular de glucosa, 4) hipertrofia miocárdica septal. El cerebro no tiene receptores de insulina significativos (está protegido del exceso anabolizante)."},
{topic:3,q:"¿Cuándo se realiza el test de O'Sullivan para tamizaje de diabetes gestacional?",opts:["En la primera consulta prenatal","Entre las 24–28 semanas de gestación (o antes si hay factores de riesgo)","Solo en el tercer trimestre","En el puerperio para diagnóstico definitivo"],ans:1,exp:"El tamizaje con O'Sullivan (50g glucosa sin ayuno, glucosa a 1h): se hace a las 24–28 semanas. Si ≥140 mg/dL (algunos usan ≥130) → PTOG 100g diagnóstica. En pacientes de alto riesgo (obesidad, DG anterior, familiar DM) se hace desde el 1er trimestre."},
{topic:3,q:"La miocardiopatía hipertrófica del hijo de madre diabética se caracteriza por:",opts:["Necesitar cirugía correctora inmediata al nacer","Ser generalmente asintomática o causar obstrucción leve; resuelve espontáneamente en 2–6 meses","Requerir trasplante cardíaco en el 30% de los casos","Asociarse siempre con bloqueo AV completo"],ans:1,exp:"La MCH del HMD es transitoria. La hipertrofia septal asimétrica (HVI septal) puede causar obstrucción dinámica del tracto de salida del VI. Generalmente resuelve en 2–6 meses. Evitar digoxina e inotrópicos (aumentan la obstrucción). Los betabloqueadores pueden usarse si hay obstrucción significativa."},
{topic:3,q:"¿Cuál es el objetivo de HbA1c preconcepcional para minimizar el riesgo de malformaciones en la mujer con DMT1?",opts:["<7.5%","<6.5% (idealmente <6%)","<8%","<5.5% con hipoglucemias frecuentes aceptables"],ans:1,exp:"HbA1c <6.5% preconcepcional reduce el riesgo de malformaciones al mínimo posible en DMT1. Sin embargo, debe balancearse con riesgo de hipoglucemia materna. La suplementación con ácido fólico 5 mg/día se inicia 3 meses antes de la concepción."},
{topic:3,q:"¿Por qué el hijo de madre diabética tiene mayor riesgo de hipoglucemia postnatal que dura varias horas?",opts:["Porque tiene menos receptores de glucagón","Porque el hiperinsulinismo neonatal persiste durante horas-días al desaparecer el estímulo glucosado materno","Porque tiene mayor masa muscular que consume glucosa rápidamente","Porque sus reservas de glucógeno hepático son menores que el RN normal"],ans:1,exp:"La célula β pancreática fetal, hipertrofiada por la hiperglucemia crónica materna, continúa secretando insulina en exceso después del nacimiento a pesar de la normoglucemia. Este hiperinsulinismo persiste 24–72 horas, causando hipoglucemia prolongada."},

{topic:4,q:"¿Cuándo se considera un recién nacido postérmino?",opts:["≥40 semanas de gestación","≥42 semanas de gestación (294 días desde FUM)","≥41 semanas de gestación","≥43 semanas de gestación"],ans:1,exp:"Postérmino: ≥42 semanas (294 días desde la FUM) o >41 6/7 semanas. Incidencia: 5–10%. Se asocia a oligohidramnios, insuficiencia placentaria, SAM, asfixia perinatal y mayor mortalidad perinatal."},
{topic:4,q:"¿Qué es la edad gestacional corregida (EGC) y hasta cuándo se usa en el seguimiento del prematuro?",opts:["EG al nacer + semanas postnatales; se usa hasta los 6 meses","Edad cronológica menos las semanas que le faltaban para llegar a las 40 semanas; se usa hasta los 2–3 años para neurodesarrollo","Solo se usa para calcular vacunas en los primeros 6 meses","Es la EG estimada por ultrasonido en el tercer trimestre"],ans:1,exp:"EGC = edad cronológica − semanas de prematurez. Ejemplo: RN de 28 sem con 3 meses de vida → EGC = 3 meses − (40–28) semanas = 3 meses − 3 meses = 0 meses (recién nacido a término equivalente). Se usa hasta 2–3 años para hitos del neurodesarrollo."},
{topic:4,q:"¿Cuáles son los parámetros biométricos que usa el ultrasonido para estimar la edad gestacional?",opts:["Solo longitud cráneo-caudal (LCC) en cualquier trimestre","LCC en 1er trimestre; DBP, CC, CA y LF en 2do-3er trimestre","Solo DBP y fémur desde el 2do trimestre","CC y CA exclusivamente en el 3er trimestre"],ans:1,exp:"US: LCC (crown-rump length) en 1er trimestre (<14 sem, error ±5–7 días). En 2do-3er trimestre: DBP, circunferencia cefálica (CC), circunferencia abdominal (CA) y longitud femoral (LF). A mayor EG, mayor margen de error (±2–3 sem en 3er trim)."},
{topic:4,q:"¿Qué implica clínicamente que un recién nacido a término sea pequeño para la edad gestacional (PEG)?",opts:["Es siempre patológico y requiere estudio cromosómico","Mayor riesgo de hipoglucemia, hipotermia, policitemia y alteraciones del neurodesarrollo; puede ser constitucional o patológico (RCIU)","Es normal y no requiere monitoreo adicional","Solo tiene importancia si el peso es <percentil 3"],ans:1,exp:"RN PEG a término: mayor riesgo de hipoglucemia (reservas bajas), hipotermia, policitemia, hiperbilirrubinemia y complicaciones metabólicas agudas. A largo plazo: riesgo de síndrome metabólico (Barker). El PEG constitucional (padres pequeños, sin causa) tiene mejor pronóstico que el RCIU patológico."},
{topic:4,q:"¿Qué son las curvas de Fenton y para qué se usan en neonatología?",opts:["Curvas de crecimiento postnatal para adultos de bajo peso","Curvas de crecimiento fetal y neonatal actualizadas (2013) para evaluar peso, talla y PC de prematuros de 22–50 semanas de EPC","Curvas de peso exclusivamente para RN a término","Curvas de presión arterial en prematuros según EG"],ans:1,exp:"Curvas de Fenton 2013: estándares de referencia para peso, talla y perímetro cefálico de prematuros desde 22 hasta 50 semanas de EPC (edad postconcepcional). Son las más usadas en UCIN para monitorear el crecimiento del prematuro y detectar restricción de crecimiento postnatal."},
{topic:4,q:"En la escala de Ballard, el signo del 'pañal' o genitales evalúa madurez sexual. En el varón, la madurez máxima (puntuación 4) se observa cuando:",opts:["Los testículos están en el canal inguinal y el escroto es liso","Los testículos están descendidos y el escroto tiene arrugas profundas que cubren toda la superficie","Los testículos no son palpables y el escroto es plano","Solo hay pigmentación escrotal sin arrugas"],ans:1,exp:"Genitales masculinos en Ballard: 0 = escroto plano, liso; 1 = escroto con leves arrugas; 2 = testículos descendiendo; 3 = testículos en escroto, arrugas moderadas; 4 = testículos péndulos, arrugas profundas cubren todo el escroto (RN a término/postérmino)."},
{topic:4,q:"Un RN que al nacer pesa 3200 g y mide 48 cm a las 39 semanas de gestación se clasifica como:",opts:["GEG por el peso","AEG, ya que tanto peso como talla están entre percentil 10–90 para 39 semanas","PEG por la talla","BPN por criterio de peso absoluto"],ans:1,exp:"A las 39 semanas, un peso de 3200 g y talla de 48 cm están dentro de los rangos normales (P10–P90) para esa EG. AEG = peso Y talla entre P10–P90. Para clasificar PEG/GEG se usan curvas de referencia, no solo el peso absoluto."},
{topic:4,q:"¿Cuál es la diferencia entre a término temprano (37–38 6/7) y a término completo (39–40 6/7) en cuanto a riesgo neonatal?",opts:["No existe diferencia clínica significativa entre ambos grupos","Los a término tempranos tienen mayor riesgo de SDR, hipoglucemia, hipotermia, hiperbilirrubinemia y dificultades de alimentación vs los a término completos","Los a término tempranos tienen mejor pronóstico neurológico","Solo los a término completos requieren evaluación neonatal al nacer"],ans:1,exp:"Los RN a término temprano (37–38 6/7) tienen mayor riesgo de SDR tipo TTRN, hipoglucemia, hipotermia, hiperbilirrubinemia e ingreso a UCIN que los a término completo (39–40 6/7). Por eso se evitan las cesáreas electivas antes de las 39 semanas."},
{topic:4,q:"La característica del nódulo mamario en la escala de Ballard indica madurez cuando:",opts:["No hay nódulo palpable en ningún sexo","Se palpa un nódulo de 5–10 mm (0.5–1 cm) en RN a término","Solo se evalúa en niñas","El nódulo supera 15 mm indicando postérmino"],ans:1,exp:"Nódulo mamario en Ballard: 0 = no palpable; 1 = apenas palpable; 2 = 1–2 mm; 3 = 3–4 mm; 4 = 5–10 mm. A mayor EG, mayor tamaño del nódulo por depósito de tejido graso. Un nódulo de 5–10 mm es típico de término (38–40 sem)."},
{topic:4,q:"¿Cuándo se sospecha edad gestacional mayor a la calculada por FUM en un recién nacido?",opts:["Cuando el RN pesa más de 3500 g","Cuando hay signos de postmadurez: piel seca/descamada/pergaminosa, uñas largas, meconio en piel, poco vérnix y lanugo, facies de 'viejo'","Cuando el APGAR es mayor de 9","Cuando la fontanela anterior es amplia y pulsátil"],ans:1,exp:"Signos de postmadurez (Clifford): piel descamada, pergaminosa, teñida de meconio, uñas largas, poco vernix, lanugo escaso, subcutáneo reducido (pliegues sueltos), facies alerta tipo 'anciano'. Confirmar con Ballard y ultrasonido previos si disponibles."},

{topic:5,q:"¿Cuáles son los principales factores de riesgo maternos para parto prematuro espontáneo?",opts:["Edad materna >35 años y obesidad exclusivamente","Antecedente de parto prematuro previo, cérvix corto, infección intraamniótica, embarazo múltiple, tabaquismo y bajo nivel socioeconómico","Solo infecciones del tracto urinario no tratadas","Hipotiroidismo materno y diabetes tipo 2"],ans:1,exp:"Factores de riesgo para PP: antecedente de PP previo (mayor riesgo), cérvix corto <25 mm en eco transvaginal, infección (corioamnionitis, BV, ITU), embarazo múltiple, polihidramnios, tabaco, drogas, bajo NSE y estrés crónico."},
{topic:5,q:"¿Qué es la leucomalacia periventricular (LPV) y en qué prematuros ocurre?",opts:["Hemorragia en los ventrículos laterales en prematuros <28 sem","Necrosis isquémica de la sustancia blanca periventricular en prematuros, especialmente <32 sem; se asocia a diplejía espástica","Infarto hemorrágico del tálamo en RN a término con asfixia","Calcificaciones cerebrales por infección por CMV"],ans:1,exp:"LPV: lesión isquémica de sustancia blanca periventricular (oligodendrocitos inmaduros muy vulnerables). Formas: quística (LPVq) y difusa. Secuela principal: diplejía espástica, déficit cognitivo y visual. Factores de riesgo: hipotensión, hipoxemia, infección."},
{topic:5,q:"La apnea de la prematuridad se define como pausa respiratoria de más de:",opts:["10 segundos","20 segundos o menos si se acompaña de bradicardia (<100 lpm) o desaturación","30 segundos siempre","15 segundos con cualquier cambio de color"],ans:1,exp:"Apnea de prematuridad: pausa respiratoria >20 seg o <20 seg con bradicardia (<100 lpm) y/o desaturación (SpO2 <80%). Tipos: central (sin esfuerzo), obstructiva y mixta (la más frecuente). Tratamiento: cafeína, CPAP, estimulación táctil."},
{topic:5,q:"¿Cuál es el tratamiento farmacológico de primera línea para la apnea de la prematuridad?",opts:["Doxapram IV","Citrato de cafeína (cafeína base): dosis carga 20 mg/kg IV, mantenimiento 5–10 mg/kg/día","Teofilina oral","Aminofilina IV como única opción"],ans:1,exp:"Cafeína (citrato de cafeína) es el tratamiento de elección para apnea del prematuro: carga 20 mg/kg IV → mantenimiento 5–10 mg/kg/día VO o IV. Ventajas sobre teofilina: mayor margen terapéutico, vida media larga (dosis única diaria), menos efectos adversos. Reduce DBP y mejora neurodesarrollo."},
{topic:5,q:"¿Cuándo se realiza el primer examen oftalmológico para screening de ROP?",opts:["A las 4 semanas de vida en todos los prematuros","A las 31 semanas de EPC o a las 4 semanas de vida (lo que sea más tardío) en prematuros <30 sem o <1500 g","Solo cuando el médico detecta signos clínicos de ROP","Al alta de la UCIN independientemente de la EG"],ans:1,exp:"Screening ROP (AAP/AAO): prematuros <30 sem o <1500 g, o 30–36 sem/<2000 g con curso inestable. Primer examen: 31 semanas de EPC o 4 semanas de vida (el que sea posterior). Continuar cada 1–2 semanas hasta vascularización completa o tratamiento."},
{topic:5,q:"El sulfato de magnesio se administra antenatalmente en el parto prematuro inminente <32 semanas para:",opts:["Inhibir el trabajo de parto (tocolisis de primera línea)","Neuroprotección fetal: reduce el riesgo de parálisis cerebral en 30–40%","Maduración pulmonar como alternativa a la betametasona","Prevenir la hemorragia intraventricular"],ans:1,exp:"MgSO4 antenatal para neuroprotección: en partos <32 semanas reduce el riesgo de parálisis cerebral y disfunción motora gruesa en 30–40% (metanálisis Cochrane). Dosis: 4g IV en bolo + 1g/h infusión hasta el parto o 24 horas. No es tocolítico de primera línea."},
{topic:5,q:"La enfermedad metabólica ósea del prematuro (osteopenia del prematuro) se produce por:",opts:["Exceso de vitamina D en la nutrición parenteral","Aporte insuficiente de calcio y fósforo durante el período de rápido crecimiento postnatal","Déficit de vitamina K que impide la mineralización","Hipercalciuria por diuréticos de asa"],ans:1,exp:"Osteopenia del prematuro: los prematuros <32 sem o <1500 g tienen altas necesidades de Ca y P (el feto recibe 150 mg/kg/día de Ca en el 3er trim) que la NP y leche materna no satisfacen sin suplementación. Riesgo de fracturas patológicas. Prevención: suplementar Ca, P y vitamina D."},
{topic:5,q:"¿Cuáles son los criterios mínimos para el alta a domicilio de un prematuro?",opts:["Solo alcanzar las 35 semanas de EPC y pesar >1800 g","Temperatura estable en cuna abierta, alimentación oral completa, apneas resueltas (sin episodios ≥5 días), peso en aumento y familia educada en CPR y cuidados","Solo necesitar FiO2 <30% y peso >2000 g","Completar el ciclo de vacunas y tamiz neonatal"],ans:1,exp:"Alta del prematuro: 1) Temperatura estable en cuna abierta, 2) Alimentación oral exclusiva con ganancia de peso adecuada, 3) Sin apneas significativas ≥5 días (sin monitor en domicilio), 4) Vacunas y tamices realizados, 5) Padres capacitados, 6) Seguimiento ambulatorio coordinado."},
{topic:5,q:"La nueva definición de displasia broncopulmonar (Jensen 2019) clasifica la gravedad según:",opts:["Solo la necesidad de O2 a las 36 semanas de EPC (definición de Jobe 2001)","El nivel de soporte respiratorio a las 36 sem de EPC: grado 1 (cánula nasal FiO2 21%), grado 2 (O2 suplementario/cánula nasal >21%) o grado 3 (VM invasiva o no invasiva)","El número de días de ventilación mecánica","La presencia de hipertensión pulmonar asociada"],ans:1,exp:"Definición Jensen (2019): grado 1: cánula nasal con FiO2 21% (flujo); grado 2: O2 >21% o cánula con alto flujo; grado 3: VM invasiva o VNI positiva. Evalúa a las 36 sem EPC. Supera la definición Jobe/Bancalari que solo usaba necesidad de O2."},
{topic:5,q:"¿Cuál es la complicación ocular grave de la administración de oxígeno suplementario no monitorizado en prematuros?",opts:["Glaucoma congénito","Retinopatía de la prematuridad con riesgo de desprendimiento de retina y ceguera","Cataratas por estrés oxidativo","Atrofia óptica bilateral"],ans:1,exp:"SpO2 >95% en prematuros aumenta el riesgo de ROP (vasodilatación → neovascularización anormal retiniana). El target de SpO2 en prematuros es 91–95%. SpO2 muy baja (<85%) aumenta mortalidad. El balance es crítico. La ROP grave puede causar desprendimiento de retina y ceguera."},

{topic:6,q:"¿Cuáles son los componentes principales del surfactante pulmonar?",opts:["80% proteínas, 20% lípidos","~80% fosfolípidos (principalmente fosfatidilcolina/DPPC), ~10% colesterol, ~10% proteínas surfactantes (SP-A, B, C, D)","50% fosfolípidos y 50% proteínas surfactantes","Solo DPPC sin proteínas asociadas"],ans:1,exp:"Surfactante: ~80% fosfolípidos (DPPC es el principal componente activo que reduce la tensión superficial), ~10% colesterol, ~10% proteínas surfactantes. SP-B y SP-C son esenciales para la adsorción del surfactante; SP-A y SP-D tienen función inmunológica."},
{topic:6,q:"¿Qué es el síndrome de escape aéreo neonatal y cuáles son sus formas?",opts:["Aspiración de meconio con atelectasias bilaterales","Colecciones de aire fuera del espacio alveolar: neumotórax, neumomediastino, enfisema intersticial pulmonar (EIP) y neumopericardio","Hiperinsuflación bilateral por obstrucción de la vía aérea","Derrame pleural bilateral por falla cardíaca"],ans:1,exp:"Síndrome de escape aéreo: rotura alveolar → aire entra al intersticio → EIP → neumotórax, neumomediastino, neumopericardio o neumoperitoneo. Más frecuente con VM agresiva. EIP en prematuros extremos es signo de mal pronóstico."},
{topic:6,q:"¿Cuándo está indicada la ventilación de alta frecuencia oscilatoria (VAFO) en el SDR neonatal?",opts:["Como primera línea en todos los prematuros <28 semanas","Como rescate cuando la VM convencional falla (FiO2 >0.6, presión pico elevada, acidosis respiratoria refractaria) o en SDR grave con escape aéreo","En todos los RN con SDR que requieran surfactante","Solo en centros de tercer nivel como modo electivo"],ans:1,exp:"VAFO está indicada en: 1) Fracaso de VMC (FiO2 >0.6, MAP >12–14 cmH2O, PCO2 elevada), 2) Escape aéreo (EIP, neumotórax recurrente), 3) HPPN refractaria, 4) Algunos usan VAFO electiva en prematuros extremos. Usar volúmenes bajos para evitar volutrauma."},
{topic:6,q:"La diferencia entre barotrauma y volutrauma en ventilación neonatal es:",opts:["Son sinónimos, ambos se refieren al daño por presión","Barotrauma: daño por presión excesiva; volutrauma: daño por volumen corriente excesivo (más relevante en la lesión pulmonar inducida por ventilador)","Volutrauma solo ocurre con VAFO","Barotrauma solo ocurre con ventilación manual (bolsa-máscara)"],ans:1,exp:"Barotrauma: lesión por presión excesiva (presión pico alta). Volutrauma: lesión por sobre-distensión con volumen corriente excesivo (Vt >6 mL/kg en RN). El volutrauma es el principal mecanismo de lesión pulmonar inducida por VM en prematuros. Ventilación con Vt 4–6 mL/kg es el objetivo."},
{topic:6,q:"El surfactante exógeno de rescate produce los siguientes efectos fisiológicos inmediatos EXCEPTO:",opts:["Reducción de la tensión superficial alveolar","Mejora de la compliance pulmonar","Reducción del requerimiento de FiO2","Reducción permanente e inmediata de la resistencia vascular pulmonar"],ans:3,exp:"Los efectos inmediatos del surfactante son: reducción de tensión superficial → aumento de compliance → mejora del intercambio gaseoso → ↓ FiO2, ↓ presiones ventilatorias. La reducción de RVP es secundaria a la mejora del intercambio gaseoso, no un efecto directo e inmediato del surfactante."},
{topic:6,q:"La escala de Downes evalúa la dificultad respiratoria neonatal. ¿En qué se diferencia de la escala de Silverman-Anderson?",opts:["Son idénticas, solo cambia el nombre","Downes incluye la evaluación de la entrada de aire y coloración además de los parámetros respiratorios (5 ítems); Silverman-Anderson evalúa solo los 5 parámetros de la mecánica respiratoria","Silverman-Anderson incluye SpO2 y pCO2","Downes se usa solo en prematuros y Silverman en RN a término"],ans:1,exp:"Silverman-Anderson (0–10): tiraje intercostal, retracción xifoidea, aleteo nasal, disociación tóraco-abdominal y quejido. Downes (0–10): FR, retracción, entrada de aire, quejido y color/cianosis. Ambas son clínicas y complementarias. Puntuación ≥6 en cualquiera indica dificultad severa."},
{topic:6,q:"¿Cuál es la diferencia entre surfactante profiláctico y de rescate?",opts:["Son idénticos en indicación y resultado","Profiláctico: se administra en sala de partos a prematuros <26 sem antes de la 1a respiración; rescate: se administra cuando hay SDR establecido con FiO2 >0.30–0.40 en CPAP","Profiláctico es solo para >32 semanas","Rescate se administra solo en VM; profiláctico solo en CPAP"],ans:1,exp:"Surfactante profiláctico (actualmente menos usado con el CPAP temprano): en sala de partos a <26 sem. Rescate (estándar actual): cuando hay SDR con FiO2 >0.30 en CPAP o al intubar. La estrategia INSURE (Intubación-Surfactante-Extubación a CPAP) y LISA/MIST (sin intubar) son las técnicas actuales preferidas."},
{topic:6,q:"¿Cuál es la FiO2 objetivo en un prematuro <32 semanas con SDR durante la ventilación mecánica?",opts:["FiO2 1.0 (100%) para garantizar oxigenación máxima","FiO2 mínima para mantener SpO2 91–95% (evitar hiperóxia y hipóxia)","SpO2 objetivo >98% con FiO2 que sea necesaria","FiO2 0.4 independientemente de la SpO2"],ans:1,exp:"En prematuros <32 semanas: SpO2 objetivo 91–95%. SpO2 >95% aumenta riesgo de ROP y daño oxidativo pulmonar; SpO2 <85% aumenta mortalidad y HIV. El target estrecho requiere monitorización continua y ajuste frecuente de FiO2."},
{topic:6,q:"La taquipnea transitoria del recién nacido (TTRN) se produce por:",opts:["Déficit de surfactante en RN a término","Reabsorción tardía del líquido pulmonar fetal, especialmente en cesárea sin trabajo de parto","Aspiración de meconio con obstrucción parcial de bronquios","Infección por estreptococo grupo B en las vías aéreas superiores"],ans:1,exp:"TTRN (wet lung): el líquido pulmonar fetal (reabsorbido durante el trabajo de parto por catecolaminas) no es expulsado adecuadamente en cesárea electiva. Se acumula en espacios intersticiales y cisuras. Rx: trama vascular prominente, líquido en cisuras, posible derrame pleural leve. Resuelve 24–72h."},
{topic:6,q:"¿Cuál es el diagnóstico diferencial más importante del SDR en un RN a término que desarrolla dificultad respiratoria desde el nacimiento?",opts:["Anemia fisiológica del recién nacido","TTRN, SAM, HPPN, neumonía neonatal, cardiopatía congénita y hernia diafragmática congénita","Solo TTRN y SAM","Hiperbilirrubinemia grave con kernicterus"],ans:1,exp:"En RN a término con dificultad respiratoria al nacer, el DDx incluye: TTRN (más frecuente), SAM, HPPN, neumonía neonatal (SGB, E. coli), hernia diafragmática congénita (ausencia de murmullo unilateral, abdomen escafoide), cardiopatía congénita y malformaciones pulmonares (MCVAP, secuestro)."},

{topic:7,q:"¿Cuál es la diferencia entre PEG constitucional y RCIU patológico?",opts:["Son sinónimos y tienen el mismo pronóstico","PEG constitucional: RN pequeño por genética/talla parental, sin compromiso fetal, Doppler normal, pronóstico excelente; RCIU: pequeño por insuficiencia placentaria con compromiso fetal y Doppler alterado","RCIU siempre requiere cesárea urgente y PEG no","Solo el RCIU tiene riesgo de hipoglucemia"],ans:1,exp:"PEG constitucional: RN pequeño (P3–P10) con Doppler umbilical normal, curva de crecimiento paralela a percentiles, sin marcadores de compromiso. RCIU patológico: crecimiento desacelerado por causa placentaria/fetal con Doppler alterado y marcadores de compromiso fetal. El manejo y pronóstico son diferentes."},
{topic:7,q:"¿Cuáles son las principales causas fetales (intrínsecas) de RCIU?",opts:["Hipertensión arterial materna e insuficiencia placentaria","Cromosomopatías (trisomía 18, 13, 21), infecciones TORCH (CMV, rubeola, toxoplasma, sífilis), malformaciones congénitas y síndromes genéticos","Tabaquismo y consumo de cocaína materna","Embarazo gemelar como única causa fetal"],ans:1,exp:"Causas fetales de RCIU: 1) Cromosomopatías: trisomía 18 (30% RCIU), trisomía 13, Turner, triploidía; 2) Infecciones TORCH (CMV es la más frecuente); 3) Malformaciones cardíacas; 4) Síndromes genéticos. Causan principalmente RCIU simétrico desde el 1er trimestre."},
{topic:7,q:"¿Qué es el Doppler venoso (ductus venoso) y cuándo se altera en el RCIU?",opts:["Evalúa el flujo en la arteria renal fetal y se altera precozmente en el RCIU","Evalúa el retorno venoso fetal; la onda 'a' negativa o ausente indica elevación de la presión telediastólica del VD, siendo un signo tardío y crítico de compromiso fetal","Se altera antes que el Doppler umbilical","Solo se altera en la hidropesía fetal no immune"],ans:1,exp:"Doppler del ductus venoso: onda 'a' positiva es normal. Onda 'a' ausente → flujo diastólico comprometido (fallo cardíaco derecho incipiente). Onda 'a' negativa (reversa) → acidosis y compromiso fetal severo, indicación de finalización independientemente de la EG. Es el marcador Doppler más crítico en RCIU."},
{topic:7,q:"El síndrome de Barker (hipótesis del origen fetal de las enfermedades) postula que:",opts:["La RCIU no tiene consecuencias a largo plazo después de los 2 años","La programación fetal adversa en RCIU predispone a HTA, diabetes tipo 2, enfermedad coronaria y obesidad en el adulto","Solo los RCIU simétricos tienen consecuencias metabólicas en el adulto","La RCIU causa exclusivamente problemas neurológicos, sin consecuencias metabólicas"],ans:1,exp:"Hipótesis de Barker (programming fetal): la adaptación metabólica del feto con RCIU (ahorro de energía, resistencia a insulina) persiste en la vida adulta. Estos individuos tienen mayor riesgo de síndrome metabólico, DM2, HTA, dislipidemia y enfermedad cardiovascular, especialmente si en la vida postnatal tienen crecimiento acelerado (catch-up)."},
{topic:7,q:"¿Cuál es el perfil biofísico fetal (PBF) y cómo se interpreta en el RCIU?",opts:["Solo evalúa la FC fetal con NST (cardiotocografía)","Evalúa 5 parámetros (movimientos respiratorios, movimientos fetales, tono fetal, líquido amniótico y NST); cada uno vale 2 puntos. Puntuación ≥8/10 = normal; ≤4/10 = compromiso fetal grave","Evalúa solo el líquido amniótico y el Doppler umbilical","Se calcula con RM fetal y Doppler de arteria cerebral media"],ans:1,exp:"PBF (Manning): 5 parámetros × 2 puntos = 10. ≥8: normal (repetir en 1 sem o según EG); 6: equívoco; ≤4: compromiso fetal, considerar finalización. En RCIU, el PBF se altera tardíamente (cuando la acidosis es grave). El Doppler es más sensible y se altera antes que el PBF."},
{topic:7,q:"¿Cuáles son las infecciones maternas más frecuentemente asociadas a RCIU simétrico?",opts:["VIH y hepatitis B","CMV (citomegalovirus), rubeola, toxoplasma y Treponema pallidum (sífilis)","Listeria monocytogenes y SGB","Influenza y COVID-19 en el primer trimestre"],ans:1,exp:"Infecciones TORCH que causan RCIU simétrico: CMV (más frecuente; calcificaciones periventriculares, microcefalia), rubeola (cataratas, cardiopatía, sordera), toxoplasmosis (calcificaciones intracraneales, hidrocefalia) y sífilis (hepatomegalia, hidropesía). Todas actúan en el 1er trimestre."},
{topic:7,q:"¿Cuál es el manejo neonatal inmediato del RN con RCIU severo en sala de partos?",opts:["Solo observación y temperatura normal","Anticipar necesidad de reanimación, control de temperatura (hipotermia frecuente), glucometría en 1a hora, manejo de policitemia y vigilancia de ECN","Administrar surfactante profiláctico siempre","Transfusión de eritrocitos inmediatamente por policitemia esperada"],ans:1,exp:"RCIU severo en sala de partos: 1) Reanimación si necesaria (hipoxia perinatal frecuente), 2) Prevención de hipotermia (reservas grasas escasas), 3) Glucometría en 1a hora (hipoglucemia por reservas bajas), 4) Hematocrito (policitemia), 5) Vigilancia de ECN (riesgo por hipoperfusión intestinal). La transfusión se indica solo si Hto >65% sintomático."},
{topic:7,q:"¿Qué parámetro biofísico se altera primero en el RCIU con compromiso fetal progresivo?",opts:["Tono fetal (último en perderse)","Doppler de arteria umbilical (flujo diastólico disminuido → ausente → reverso) antes que el PBF","Movimientos respiratorios fetales","Cantidad de líquido amniótico"],ans:1,exp:"Secuencia de alteración en RCIU: 1.° Doppler arteria umbilical (↑ resistencia, ↓ flujo diastólico); 2.° Arteria cerebral media (brain sparing, ↓ resistencia); 3.° Doppler venoso; 4.° NST (desaceleraciones, patrón sinusoidal); 5.° PBF (tono es lo último en perderse). El Doppler umbilical es el primer marcador."},
{topic:7,q:"¿Cuál es la causa más frecuente de RCIU en países de altos ingresos?",opts:["Desnutrición materna","Insuficiencia uteroplacentaria secundaria a trastornos hipertensivos (preeclampsia, HTA crónica) y trombofilia","Infección por malaria","Embarazo en adolescentes <16 años"],ans:1,exp:"En países de altos ingresos, la insuficiencia uteroplacentaria por trastornos hipertensivos (HTA crónica, preeclampsia) es la causa más frecuente de RCIU asimétrico de 3er trimestre. También: tabaquismo, trombofilia, lupus, nefropatía y DM con vasculopatía."},
{topic:7,q:"¿Cuándo se considera exchange transfusion (exanguinotransfusión parcial) en el RN con policitemia por RCIU?",opts:["En todos los RN con RCIU independientemente del hematocrito","Solo si Hto venoso central >65% con síntomas (hipoglucemia refractaria, convulsiones, insuficiencia cardíaca, trombosis)","Si Hto >55% en cualquier muestra capilar","Siempre al nacer en prematuros con RCIU"],ans:1,exp:"Exanguinotransfusión parcial (dilución con suero salino): indicada si Hto venoso >65% CON síntomas de hiperviscosidad (hipoglucemia refractaria, convulsiones, cianosis, ICC, ECN, oliguria). Hto >70–75% algunos lo consideran indicación independientemente de síntomas. Meta: reducir Hto a ~55%."},

{topic:8,q:"¿Cuál es la diferencia entre BPN por prematuridad y BPN por RCIU en cuanto al pronóstico neurológico?",opts:["El BPN por prematuridad siempre tiene mejor pronóstico que el por RCIU","El BPN por RCIU simétrico de causa genética/infecciosa tiene peor pronóstico neurológico que el BPN por prematuridad sin RCIU","El RCIU siempre tiene mejor pronóstico que la prematuridad extrema","No hay diferencia de pronóstico entre ambos grupos"],ans:1,exp:"RCIU simétrico de inicio precoz (cromosomopatías, TORCH): peor pronóstico neurológico (el daño cerebral ocurre durante períodos críticos del desarrollo). El BPN por prematuridad sin RCIU tiene mejor potencial de recuperación neurológica con intervención temprana. El RCIU asimétrico tardío tiene mejor pronóstico relativo."},
{topic:8,q:"¿Cuándo debe iniciarse la nutrición enteral mínima (nutrición trófica) en el MBPN?",opts:["Solo cuando haya peristaltismo visible por ecografía","En las primeras 24–72 horas de vida si el RN está hemodinámicamente estable, con volúmenes pequeños (10–20 mL/kg/día)","Solo después de 7 días de NP completa","Cuando la PCA esté tratada y cerrada"],ans:1,exp:"Nutrición enteral mínima (trófica): 10–20 mL/kg/día desde las primeras 24–72 horas estimula la maduración intestinal (liberación de hormonas tróficas, desarrollo de la microbiota), reduce la permeabilidad intestinal y previene la atrofia vellositaria. No está contraindicada en MBPN estable."},
{topic:8,q:"¿Cuál es la necesidad calórica del prematuro de muy bajo peso para lograr crecimiento óptimo?",opts:["60–80 kcal/kg/día","110–130 kcal/kg/día (enteral) o 90–110 kcal/kg/día (parenteral) con 3.5–4 g/kg/día de proteínas","150–200 kcal/kg/día siempre","80–90 kcal/kg/día es suficiente con NP"],ans:1,exp:"MBPN: requerimiento calórico 110–130 kcal/kg/día (enteral) con 3.5–4 g/kg/día de proteínas para alcanzar la velocidad de crecimiento intrauterino (15–20 g/kg/día). Con NP: 90–110 kcal/kg/día es eficiente por no tener pérdidas fecales. La restricción calórica lleva a restricción de crecimiento postnatal."},
{topic:8,q:"La osteopenia del prematuro (enfermedad metabólica ósea) se diagnostica principalmente mediante:",opts:["Radiografía ósea de rutina a las 4 semanas de vida","Medición de fosfatasa alcalina sérica (>800 UI/L sugiere osteopenia) y fósforo sérico bajo (<5 mg/dL), confirmado con DEXA si disponible","Solo por fractura espontánea como primera manifestación","RMN de columna vertebral"],ans:1,exp:"Osteopenia del prematuro: fosfatasa alcalina >800 UI/L + fósforo sérico <5 mg/dL son los marcadores bioquímicos de rutina. La Rx muestra osteopenia cuando ya perdió >30–40% de la masa ósea. DEXA es el estándar de oro pero poco disponible. Prevención: Ca 120–200 mg/kg/día, P 60–140 mg/kg/día, Vit D 400–1000 UI/día."},
{topic:8,q:"¿Qué es la hipotermia neonatal y cuál es la estrategia de prevención más efectiva en el BPN?",opts:["Temperatura >38°C; se previene con abanicado","Temperatura central <36.5°C; se previene con: sala de partos cálida (26°C para prematuros), bolsa de polietileno, servocontrol, método canguro y precalentamiento de la incubadora","Temperatura <35°C; solo tratada con calefón externo","Se define como temperatura <37°C y se previene solo con toca de lana"],ans:1,exp:"Hipotermia: Tª central <36.5°C. En prematuros/BPN: mayor riesgo por alta relación superficie/volumen, escasa grasa subcutánea, piel inmadura. Prevención: 1) Sala 26°C+, 2) Bolsa plástica en <28 sem, 3) Colchón exotérmico, 4) Precalentar incubadora, 5) Método canguro. La hipotermia aumenta mortalidad, riesgo de ECN y SDR."},
{topic:8,q:"¿Cuál es el papel de la eritropoyetina recombinante (rHuEPO) en el manejo del prematuro?",opts:["Es el tratamiento de primera línea para la anemia de la prematuridad y elimina la necesidad de transfusiones en todos los MBPN","Reduce modestamente el número de transfusiones; se usa en algunos protocolos pero no es estándar universal por beneficio limitado y posible riesgo de ROP","Está contraindicada en todos los prematuros por riesgo de policitemia","Aumenta el Hto rápidamente en las primeras 24 horas"],ans:1,exp:"rHuEPO (eritropoyetina): estimula la eritropoyesis. Estudios muestran reducción modesta de transfusiones. No elimina la necesidad de transfusiones en EBPN. Posible riesgo de ROP (factor angiogénico). El enfoque principal es: pinzamiento tardío de cordón, minimizar flebotomías y umbrales restrictivos de transfusión."},
{topic:8,q:"¿Cuáles son los criterios diagnósticos de enterocolitis necrotizante estadio II según Bell modificado?",opts:["Solo apnea y distensión abdominal sin hallazgos radiológicos","Signos sistémicos (apnea, bradicardia, letargia) + signos abdominales (distensión, sensibilidad) + hallazgos radiológicos (neumatosis intestinal y/o gas en porta)","Solo perforación intestinal con neumoperitoneo","Únicamente sangre en heces con fiebre"],ans:1,exp:"Bell modificado: Estadio I (sospecha): signos sistémicos leves + sangre en heces. Estadio II (definitivo): signos sistémicos moderados + distensión abdominal + neumatosis intestinal en Rx ± gas en vena porta. Estadio III (avanzado): deterioro grave + neumoperitoneo (perforación). El estadio II requiere NPO y antibióticos."},
{topic:8,q:"¿Cuál es la vacuna que debe administrarse al MBPN al alcanzar los 2 meses de edad cronológica (no corregida)?",opts:["Solo Hepatitis B (segunda dosis)","Las vacunas del esquema nacional correspondientes a 2 meses de edad cronológica (DTaP, Hib, PCV, Polio, Rotavirus) según edad cronológica, no corregida","Solo cuando alcance las 40 semanas de EPC","DTaP y Hib pero no rotavirus por riesgo de intususcepción"],ans:1,exp:"Las vacunas en prematuros se administran según edad cronológica (no corregida), desde los 2 meses de vida. En hospitalizados, se dan en el hospital si están estables. Excepción: HBV primera dosis se retrasa hasta que pese >2000 g si la madre es HBsAg negativa."},
{topic:8,q:"El seguimiento neurológico del MBPN al año de edad corregida incluye evaluación de:",opts:["Solo el coeficiente intelectual con test de Wechsler","Tono muscular, desarrollo motor (sentarse, marcha), lenguaje, conducta, visión y audición; usando escalas como Bayley III o Ages & Stages (ASQ)","Solo signos de parálisis cerebral con examen neurológico básico","Solo visión y audición, sin evaluación cognitiva hasta los 5 años"],ans:1,exp:"Seguimiento neurológico del MBPN al año de EPC: examen neurológico (tono, reflejos, motor grueso/fino), Bayley III o equivalente (cognitivo, lenguaje, motor), visión (ROP, estrabismo, nistagmo), audición (hipoacusia neurosensorial) y conducta. Detecta secuelas para intervención temprana."},
{topic:8,q:"¿Cuál es la causa más frecuente de reingreso hospitalario en el primer mes tras el alta del prematuro tardío?",opts:["Enterocolitis necrotizante tardía","Hiperbilirrubinemia grave, hipoglucemia y dificultades de alimentación/deshidratación","Apneas del prematuro tardías","Infección por VSR grave"],ans:1,exp:"Los prematuros tardíos (34–36 6/7) tienen alta tasa de reingreso en el 1er mes: hiperbilirrubinemia (ictericia grave), dificultades de alimentación y deshidratación hipernatrémica, hipoglucemia e hipotermia. Son los 'falsos a término': se ven como RN normales pero tienen inmadurez fisiológica significativa."},

{topic:9,q:"¿Cuáles son los principales componentes inmunológicos de la leche materna?",opts:["Solo anticuerpos IgG maternos","IgA secretora (sIgA), lactoferrina, lisozima, macrófagos, linfocitos T y B, complemento, oligosacáridos y prebióticos","Solo leucocitos polimorfonucleares","Solo IgM e IgG en calostro"],ans:1,exp:"Factores inmunológicos de la leche materna: sIgA (protege mucosas intestinal y respiratoria), lactoferrina (bacteriostática, quelante de Fe), lisozima (bactericida), macrófagos, linfocitos, citocinas, complemento y oligosacáridos HMO (prebióticos que favorecen bifidobacterias)."},
{topic:9,q:"¿Qué es una crisis de lactancia y cuándo ocurre con mayor frecuencia?",opts:["Infección mamaria aguda que requiere antibióticos","Período de 2–6 días con aumento de la demanda del bebé y percepción materna de leche insuficiente; ocurre alrededor de las 2–3 semanas, 6 semanas y 3 meses","Descenso permanente de la producción de leche que requiere galactogogos","Sangrado por grietas del pezón que impide amamantar"],ans:1,exp:"Crisis de lactancia: períodos de mayor demanda del bebé (crecimiento acelerado) → madre percibe que 'no tiene suficiente leche' → ansiedad → inhibición de oxitocina → ciclo vicioso. Ocurre ~2–3 semanas, 6 semanas, 3 meses. Solución: amamantar más frecuente, apoyo emocional, no usar fórmula suplementaria."},
{topic:9,q:"¿Cuánto tiempo puede conservarse la leche materna extraída a temperatura ambiente (25°C)?",opts:["Solo 1 hora","Hasta 4–6 horas a 25°C; 4 días en refrigerador (4°C); 6–12 meses en congelador (-18°C)","24 horas a temperatura ambiente","Solo puede conservarse en congelador, no en refrigerador"],ans:1,exp:"Conservación de leche materna: 4–6 horas a 25°C; hasta 4 días en refrigerador (4°C); 6 meses en congelador (-18°C), hasta 12 meses en congelador de -20°C. La leche de banco pasteurizada tiene diferentes requisitos. Descongelar en refrigerador o agua tibia, no microondas."},
{topic:9,q:"¿Cuáles son los beneficios de la lactancia materna para la madre?",opts:["Solo ayuda a perder peso en el postparto","Involución uterina más rápida (oxitocina), reducción de riesgo de cáncer de mama y ovario, efecto anticonceptivo (LAM), reducción de depresión postparto y menor riesgo de DM tipo 2 y osteoporosis","Solo previene la anemia materna","No tiene beneficios para la madre, solo para el bebé"],ans:1,exp:"LM para la madre: 1) Involución uterina (oxitocina → reduce HPP), 2) Amenorrea lactacional (LAM: 98% efectivo si LM exclusiva + amenorrea + <6 meses), 3) ↓ Ca mama y ovario (dosis-respuesta), 4) ↓ DM2 y síndrome metabólico, 5) Mejor vínculo, 6) ↓ depresión postparto."},
{topic:9,q:"La galactorrea (galactogogo) se usa cuando la producción de leche es insuficiente. ¿Cuál es el galactogogo más estudiado?",opts:["Metoclopramida (10 mg 3 veces/día), que aumenta la prolactina por bloqueo dopaminérgico","Domperidona (30–90 mg/día), con mejor perfil de seguridad que metoclopramida (menos efectos neurológicos)","Fenugreek (alholva) como única opción basada en evidencia","Oxitocina intranasal como primera línea"],ans:1,exp:"Galactogogos: Domperidona (10–20 mg 3x/día): aumenta prolactina por bloqueo de receptores D2 periféricos, menos efectos neurológicos que metoclopramida. Metoclopramida: riesgo de síntomas extrapiramidales y depresión. La evidencia de galactogogos herbales (fenugreek, moringa) es limitada. El vaciado frecuente sigue siendo lo más efectivo."},
{topic:9,q:"¿Qué es la ictericia por falta de leche (ictericia de inanición) y cómo se diferencia de la ictericia por leche materna?",opts:["Son idénticas y se tratan igual","Inanición: aparece en días 2–5 por aporte insuficiente de leche → escasa eliminación de meconio → recirculación enterohepática; se resuelve mejorando la LM. Ictericia por leche materna: aparece >5–7 días por factores en la leche que inhiben la conjugación","Ambas requieren suspender la lactancia","Solo la de inanición requiere fototerapia"],ans:1,exp:"Ictericia de inanición (days 2–5): poca leche → poco meconio eliminado → hiperbilirrubinemia por recirculación enterohepática. Tratamiento: mejorar tomas, no suspender LM. Ictericia por leche materna (>7 días): factor en la leche (lipasa activa → ácidos grasos libres inhiben UDP-glucuroniltransferasa). Bilirrubina puede llegar a >20 mg/dL. Raramente se suspende la LM."},
{topic:9,q:"¿Cuáles son las posiciones más recomendadas para amamantar?",opts:["Solo la posición clásica de cuna es correcta","Cuna (tradicional), cuna cruzada, balón de rugby (football hold) y acostada lateral; todas válidas según preferencia y situación (cesárea, gemelar, prematuros)","Solo la posición acostada está recomendada por la OMS","La posición importa solo en las primeras 24 horas"],ans:1,exp:"Posiciones para amamantar: 1) Cuna: cabeza del bebé en el codo del brazo homolateral; 2) Cuna cruzada: control de cabeza con mano contralateral (útil para aprender); 3) Balón de rugby: cuerpo del bebé bajo el brazo (útil en cesárea o grandes pechos); 4) Lateral: recostadas (útil en cesárea o por las noches)."},
{topic:9,q:"¿Cuáles son los medicamentos seguros durante la lactancia para el tratamiento del dolor postparto?",opts:["Aspirina y ketoprofeno son los de primera línea","Paracetamol e ibuprofeno son los analgésicos de primera línea; evitar aspirina (síndrome de Reye), codeína (toxicidad por metabolismo ultrarrápido) y ketorolaco >5 días","Morfina IV no pasa a la leche y es completamente segura","Todos los AINEs están contraindicados en lactancia"],ans:1,exp:"Analgesia segura en LM: paracetamol e ibuprofeno son primera línea (mínimo paso a leche). Evitar: aspirina (riesgo síndrome de Reye en bebé), codeína (metabolismo a morfina imprevisible por CYP2D6 → sobredosis neonatal reportada), ketorolaco (corto plazo aceptable). Consultar LactMed para cada fármaco."},
{topic:9,q:"La ingurgitación mamaria se produce típicamente:",opts:["Solo en madres que no amamantan","Entre el 2.° y 5.° día postparto por la subida de la leche; se maneja con tomas frecuentes, extracción manual, compresas frías entre tomas y calor antes de amamantar","Solo en primíparas después del 10.° día","Es una mastitis incipiente que siempre requiere antibióticos"],ans:1,exp:"Ingurgitación mamaria: 2.°–5.° día, por aumento de sangre y linfa (no solo leche). Mama tensa, dolorosa, con edema que dificulta el agarre. Manejo: 1) Tomas frecuentes (vaciar pecho), 2) Extracción manual antes de la toma (areola más blanda = mejor agarre), 3) Compresas frías entre tomas, 4) Calor húmedo antes de amamantar. No es mastitis."},
{topic:9,q:"¿Qué es el método LAM (Lactancia-Amenorrea) como método anticonceptivo y cuáles son sus condiciones?",opts:["Es efectivo siempre que la madre amamante aunque sea parcialmente","Es efectivo (98%) SOLO si: LM exclusiva + amenorrea + bebé <6 meses; si alguna condición falla, debe usarse otro método anticonceptivo","Es efectivo hasta los 12 meses si la LM es predominante","No es un método reconocido por la OMS"],ans:1,exp:"LAM: tasa de fallo 0.5–2% si se cumplen LAS 3 condiciones: 1) LM exclusiva o casi exclusiva (≥6 tomas/día, incluyendo nocturnas), 2) Amenorrea (sin menstruación), 3) Bebé <6 meses. Si alguna condición cambia, LAM no es confiable y debe añadirse otro método."},
