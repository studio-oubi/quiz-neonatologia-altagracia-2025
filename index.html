{topic:10,q:"¿Cuál es el score EONS (Neonatal Early Onset Sepsis Calculator) del Kaiser y para qué sirve?",opts:["Calcula la gravedad de la sepsis tardía en prematuros","Estima la probabilidad de EOS basándose en EG, factores de riesgo maternos (SGB, fiebre, ROM) y estado clínico del RN, guiando el uso racional de antibióticos","Evalúa el riesgo de sepsis tardía en RN con catéteres centrales","Solo se aplica a RN de <32 semanas"],ans:1,exp:"Kaiser EOS Calculator (kp.org): algoritmo multivariable que usa EG, colonización materna SGB, fiebre intraparto, ROM, antibióticos intraparto y estado clínico del RN para calcular la probabilidad de EOS. Ayuda a decidir quién necesita antibióticos empíricos vs observación. Reduce el uso innecesario de antibióticos en ~50%."},
{topic:10,q:"¿Cuál es la diferencia clínica entre SRIS neonatal y sepsis neonatal?",opts:["Son sinónimos con los mismos criterios diagnósticos","SRIS: respuesta inflamatoria sistémica (FR, FC, temperatura y leucocitos alterados) sin foco infeccioso confirmado; sepsis: SRIS + infección documentada (hemocultivo +) o fuertemente sospechada","Solo el hemocultivo positivo diferencia el SRIS de la sepsis","SRIS solo ocurre en prematuros, sepsis en cualquier RN"],ans:1,exp:"SRIS neonatal: ≥2 de: temperatura anormal (<36.5 o >37.5°C), FC>160 o <100, FR>60, leucocitos anormales (<4000 o >34000 o >10% inmaduros). Sepsis: SRIS + infección confirmada o clínicamente evidente. La definición en neonatos es más laxa que en adultos por la inespecificidad de los signos."},
{topic:10,q:"La sepsis neonatal por Listeria monocytogenes se caracteriza por:",opts:["Afectar exclusivamente a prematuros tardíos con fiebre materna","Transmisión transplacentaria → granulomatosis infantiséptica (lesiones granulomatosas en hígado, pulmón); o perinatal tardía con meningitis; la madre tiene síndrome seudogripal. Relacionado con consumo de alimentos contaminados (queso, embutidos)","Solo causar meningitis en RN a término sin síntomas maternos","No cruzar la placenta, siendo siempre una infección postnatal"],ans:1,exp:"Listeria: gram positivo intracelular. Infección materna por alimentos (queso fresco, embutidos, paté) → fiebre, mialgias, síntomas GI. Transmisión transplacentaria causa granulomatosis infantiséptica (rash, nódulos hepáticos, neumonía, meningitis). Mortalidad alta. Tratamiento: ampicilina + gentamicina."},
{topic:10,q:"¿Cuál es el tratamiento antifúngico de elección para la candidemia neonatal invasiva?",opts:["Fluconazol oral en todos los casos","Anfotericina B deoxicolato (0.5–1 mg/kg/día) o anfotericina liposomal (3–5 mg/kg/día) si hay afectación del SNC; micafungina como alternativa en caso de intolerancia","Voriconazol IV como primera línea","Caspofungina exclusivamente en EBPN"],ans:1,exp:"Candidemia neonatal: anfotericina B deoxicolato (0.5–1 mg/kg/día) o micafungina (4–10 mg/kg/día) son las primeras líneas. Anfotericina liposomal si hay nefrotoxicidad o afectación del SNC (mejor penetración). Fluconazol: profilaxis en EBPN o tratamiento de infección no complicada por Candida sensible. Duración: ≥14 días tras último hemocultivo negativo."},
{topic:10,q:"¿Cuándo está indicada la punción lumbar en el neonato con sospecha de sepsis?",opts:["Solo si hay convulsiones","Siempre que haya sospecha de sepsis neonatal (especialmente EOS), meningitis no puede descartarse clínicamente; también si hemocultivo positivo, mala respuesta antibiótica o signos neurológicos","Solo en hemocultivo positivo a las 48 horas","Solo en RN a término >7 días de vida"],ans:1,exp:"PL está indicada en: 1) Sepsis clínica neonatal (la meningitis coexiste en 20–25% de EOS y 25% de LOS), 2) Hemocultivo positivo, 3) Signos neurológicos (convulsiones, fontanela tensa), 4) Mala respuesta al tratamiento. Si el RN está inestable, diferir PL pero iniciar antibióticos que cubran SNC (ampicilina + cefotaxima o gentamicina con buena penetración)."},
{topic:10,q:"¿Cuál es la duración del tratamiento antibiótico para meningitis neonatal por SGB?",opts:["7 días de ampicilina IV","14 días (mínimo) para SGB; 21 días para gramnegativos y Listeria; ajustar si hay colecciones o ventriculitis","Solo 5 días si el LCR se normaliza","10 días es suficiente para cualquier agente"],ans:1,exp:"Meningitis neonatal: SGB → mínimo 14 días; gramnegativos (E. coli, Klebsiella) → 21 días; Listeria → 21 días. Se requiere PL de control a las 48–72 h para confirmar esterilización. Si hay ventriculitis o absceso cerebral, puede necesitar >21 días. El ATB debe penetrar bien en LCR: cefotaxima > gentamicina."},
{topic:10,q:"¿Cuáles son las principales complicaciones de la meningitis bacteriana neonatal?",opts:["Solo fiebre prolongada sin secuelas neurológicas","Ventriculitis, hidrocefalia, infarto cerebral, absceso cerebral, epilepsia, sordera neurosensorial, discapacidad intelectual y parálisis cerebral","Solo hipoacusia conductiva transitoria","Trombocitopenia aislada sin compromiso del SNC"],ans:1,exp:"Complicaciones de meningitis neonatal: agudas (ventriculitis, absceso, hidrocefalia, SIADH, infarto cerebral). Crónicas: epilepsia (30%), sordera neurosensorial (15–20%), discapacidad intelectual (30%), parálisis cerebral (10%), hidrocefalia que requiere DVP. Mortalidad: 5–20% según agente. Secuelas en ~40% de supervivientes."},
{topic:10,q:"El índice I/T (inmaduro/total) en el hemograma es útil en sepsis neonatal. ¿Cuál es el valor considerado anormal?",opts:[">0.05","≥0.20 (I/T ratio ≥0.20 indica neutrofilia inmadura significativa)","≥0.50","≥0.10 es diagnóstico de sepsis"],ans:1,exp:"Índice I/T: neutrófilos inmaduros (bandas + metamielocitos + mielocitos) ÷ total de neutrófilos. Normal en RN: <0.16 al nacer (puede ser mayor en primeras horas). ≥0.20 es sugestivo de infección. Sensibilidad ~60%, especificidad ~70%. Mejor como parte del hemograma completo que como marcador aislado."},
{topic:10,q:"¿Cuál es la sepsis por MRSA en UCIN y cuál es su tratamiento?",opts:["MRSA no existe en neonatología","Staph aureus resistente a meticilina que puede causar bacteriemia, neumonía necrotizante, endocarditis o fascitis; tratamiento: vancomicina IV (15 mg/kg c/6h con niveles) o linezolid como alternativa","Se trata con ampicilina + gentamicina","Solo causa infecciones de piel sin bacteriemia"],ans:1,exp:"MRSA neonatal: cada vez más frecuente en UCIN (2–5% de cultivos). Formas: bacteriemia con catéter, neumonía necrotizante, osteomielitis, artritis séptica. Tratamiento: vancomicina IV (nivel valle 15–20 mcg/mL o AUC-guiado). Alternativas: linezolid, daptomicina, ceftarolina (datos limitados en neonatos). Descolonización con mupirocina nasal."},
{topic:10,q:"¿Cuál es la definición de sepsis neonatal confirmada?",opts:["Sospecha clínica con PCR elevada sin hemocultivo","Hemocultivo positivo con microorganismo patógeno + signos clínicos de infección, independientemente del volumen de muestra","Cualquier crecimiento en hemocultivo automático en las primeras 24 h","PCR >10 mg/L + procalcitonina >2 ng/mL sin hemocultivo"],ans:1,exp:"Sepsis confirmada: hemocultivo positivo con patógeno reconocido (no contaminante de piel como SCN en un solo hemocultivo sin catéter) + signos clínicos. Volumen óptimo de hemocultivo: ≥1 mL (mejorar sensibilidad). SCN: requiere ≥2 hemocultivos positivos del mismo clon o uno positivo con catéter en contexto clínico compatible."},

{topic:11,q:"¿Cuáles son los pasos iniciales de la reanimación neonatal según NRP 2020?",opts:["Intubar, ventilar y comprimir en los primeros 30 segundos","Proporcionar calor, posicionar la cabeza en posición de olfateo, limpiar la vía aérea si es necesario, secar y estimular; todo en los primeros 30 segundos","Solo secar y estimular sin maniobras adicionales en los primeros 30 s","Aplicar CPAP inmediatamente y evaluar la SpO2"],ans:1,exp:"Pasos iniciales NRP (30 segundos): 1) Calor (colchón caliente, servocontrol), 2) Posición de olfateo (extensión moderada del cuello), 3) Limpiar vía aérea solo si hay obstrucción, 4) Secar vigorosamente, 5) Estimulación táctil (frotar dorso, frotar plantas). Luego evaluar: FC, respiración, tono."},
{topic:11,q:"¿Cómo se evalúa la efectividad de la ventilación con bolsa y máscara (VPP) durante la reanimación?",opts:["Solo por la mejoría del color del RN","Aumento de la FC es el indicador más confiable de ventilación efectiva; también: movimiento torácico visible y bilateral, mejoría de SpO2 y llanto","Solo por la SpO2 preductal","Por la auscultación de murmullo vesicular en ambas bases"],ans:1,exp:"VPP efectiva: 1.° La FC debe aumentar (>100 lpm en 30 seg) = indicador MÁS IMPORTANTE de ventilación efectiva. 2.° Movimiento torácico simétrico y visible. 3.° Mejoría de SpO2. Si FC no sube con VPP: verificar SIBO (Sello, posIción, vía aérea, pBoca abierta, O2 y Presión)."},
{topic:11,q:"¿Cuándo está indicada la intubación endotraqueal durante la reanimación neonatal?",opts:["En todo RN prematuro <34 semanas al nacer","Cuando la VPP con bolsa-máscara no es efectiva (FC no sube), se requiere surfactante, hay hernia diafragmática sospechada o se necesitan compresiones cardíacas prolongadas","Siempre que el APGAR sea <5 al minuto","Solo si hay LAM espeso"],ans:1,exp:"Intubación indicada en NRP: 1) VPP inefectiva con bolsa-máscara, 2) Se administrará surfactante, 3) Hernia diafragmática congénita (evitar ventilación con máscara), 4) Compresiones cardíacas (asegurar vía aérea para coordinación), 5) Prematuros extremos según protocolo del centro. La mascarilla laríngea es alternativa si la intubación falla."},
{topic:11,q:"¿Cuál es la posición correcta de la cabeza (neutral) durante la VPP neonatal?",opts:["Hiperextensión máxima del cuello (como en RCP adultos)","Posición de olfateo: ligera extensión del cuello (como olfateando una flor), que alinea la faringe, la laringe y la tráquea","Flexión del cuello con el mentón al pecho","Rotación de la cabeza 45° a la derecha"],ans:1,exp:"Posición de olfateo: cuello en ligera extensión (no hiperextensión como en adultos). Un rodillo pequeño bajo los hombros ayuda en RN con occipucio prominente. La hiper o hipoextensión del cuello obstruye la vía aérea del RN y reduce la efectividad de la VPP."},
{topic:11,q:"¿Cuándo se debe suspender la reanimación neonatal según las guías actuales?",opts:["A los 5 minutos si no hay respuesta","Si no hay signos de vida (FC indetectable) a los 10–20 minutos de reanimación adecuada, en acuerdo con el equipo y la familia, según contexto clínico y EG","Siempre a los 15 minutos independientemente de la respuesta","Solo si los padres lo solicitan expresamente"],ans:1,exp:"NRP 2020/ILCOR: considerar suspender si FC no se detecta después de 10 minutos de reanimación adecuada. Sin embargo, esta decisión debe individualizarse según: EG, causa de la asfixia, respuesta parcial, disponibilidad de hipotermia terapéutica, deseo familiar y recursos. No es una regla absoluta."},
{topic:11,q:"¿Cuál es la vía de acceso vascular de elección cuando no hay acceso venoso periférico durante la reanimación neonatal?",opts:["Punción arterial femoral","Catéter venoso umbilical (CVU) como primera línea; vía intraósea (IO) como alternativa si CVU falla","Vía intratraqueal para todos los medicamentos","Catéter arterial umbilical"],ans:1,exp:"Acceso vascular en reanimación: 1.° CVU: rápido, confiable, puede usarse sin confirmar posición para epinefrina urgente (insertar 2–4 cm hasta obtener retorno libre). 2.° Vía IO: tibia proximal o distal, epífisis distal del fémur. La vía intratraqueal para epinefrina tiene absorción impredecible y solo es provisional."},
{topic:11,q:"¿Cuál es la técnica correcta de compresiones cardíacas neonatales?",opts:["Técnica de un dedo en el tercio inferior del esternón","Técnica de dos pulgares rodeando el tórax, presionando el tercio inferior del esternón (entre xifoides y línea intermamilar), comprimiendo 1/3 del diámetro AP del tórax","Técnica de talón de mano como en el adulto","Compresiones en el quinto espacio intercostal izquierdo"],ans:1,exp:"Técnica de 2 pulgares (preferida): ambos pulgares sobre el tercio inferior del esternón, manos rodean el tórax, dedos bajo la espalda. Profundidad: 1/3 del diámetro anteroposterior. Vs técnica de 2 dedos (dos dedos verticales): menos eficaz, más fatigante. La técnica de 2 pulgares genera mayor presión sistólica y coronaria."},
{topic:11,q:"¿Qué se debe verificar antes de iniciar las compresiones cardíacas neonatales?",opts:["Que el RN pese más de 2 kg","Que la ventilación sea efectiva (FC subió con VPP) antes de confirmar la necesidad de compresiones","Que el acceso IV esté disponible","Que la temperatura del RN sea normal"],ans:1,exp:"Antes de iniciar compresiones: CONFIRMAR que la FC es <60 lpm a pesar de VPP EFECTIVA (con movimiento torácico). Si la VPP no era efectiva (obstrucción, posición incorrecta), primero corregir la ventilación. Las compresiones sin ventilación efectiva son inútiles. Aumentar FiO2 a 100% al iniciar compresiones."},
{topic:11,q:"En la reanimación neonatal, ¿cuándo se considera el uso de expansores de volumen?",opts:["Rutinariamente en todo RN con FC <60 lpm","Solo si se sospecha hipovolemia (palidez, pulsos débiles, FC que no responde a VPP + compresiones + epinefrina) → suero fisiológico 10 mL/kg IV lento en 5–10 minutos","En todos los prematuros <30 semanas durante la reanimación","Si la saturación no mejora con O2 al 100%"],ans:1,exp:"Expansión de volumen: indicada si hay signos de hipovolemia (palidez persistente, pulsos débiles, historia de sangrado: abruptio, placenta previa, vasa previa, transfusión feto-materna). SSN 10 mL/kg IV en 5–10 min. Puede repetirse. Evitar en prematuros si no hay hipovolemia clara (riesgo de HIV)."},
{topic:11,q:"¿Cuál es el papel del APGAR en la toma de decisiones de reanimación neonatal?",opts:["El APGAR al minuto 1 determina si se inicia la reanimación","El APGAR NO debe usarse para iniciar la reanimación (se decide antes del 1er minuto); sirve para evaluar respuesta a la reanimación y documentar el estado del RN a los 1 y 5 minutos","El APGAR a los 5 minutos predice con certeza el pronóstico neurológico","Solo el APGAR a los 10 minutos tiene valor clínico"],ans:1,exp:"APGAR: NO es la herramienta para decidir iniciar la reanimación (esa decisión se hace en los primeros 30 segundos evaluando respiración, tono y FC). Sí sirve para: evaluar respuesta a la reanimación (APGAR seriado), documentación y tiene valor pronóstico relativo (APGAR <3 a los 10–20 min se asocia a mayor morbi-mortalidad)."}

// State
let activeQuiz = 1;
let questions = questions1;
let answered = new Array(questions.length).fill(null);
let currentTopic = 0;
let topicScores = topics.map(() => ({ correct: 0, total: 0 }));

function switchQuiz(n) {
  activeQuiz = n;
  questions = n === 1 ? questions1 : questions2;
  answered = new Array(questions.length).fill(null);
  currentTopic = 0;
  topicScores = topics.map(() => ({ correct: 0, total: 0 }));
  document.getElementById('btn-q1').classList.toggle('qs-active', n === 1);
  document.getElementById('btn-q2').classList.toggle('qs-active', n === 2);
  document.getElementById('final-screen').style.display = 'none';
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function getFilteredQuestions() {
  return questions.map((q, i) => ({...q, idx: i})).filter(q => q.topic === currentTopic);
}

function renderTopicNav() {
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = topics.map((t, i) => {
    const qs = questions.filter(q => q.topic === i);
    const ans = qs.filter((_, qi) => answered[questions.indexOf(qs[qi])] !== null);
    const done = ans.length === qs.length;
    const cls = i === currentTopic ? 'topic-btn active' : done ? 'topic-btn done' : 'topic-btn';
    return `<button class="${cls}" onclick="switchTopic(${i})">${i+1}. ${t.split(' ').slice(0,3).join(' ')}</button>`;
  }).join('');
}

function renderQuiz() {
  const filtered = getFilteredQuestions();
  const allAnswered = answered.filter(a => a !== null).length;
  const allCorrect = answered.reduce((s, a, i) => a === questions[i].ans ? s+1 : s, 0);
  const allWrong = answered.filter(a => a !== null).length - allCorrect;

  document.getElementById('q-current').textContent = allAnswered;
  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('score-count').textContent = allCorrect;
  document.getElementById('wrong-count').textContent = allWrong;
  document.getElementById('pbar').style.width = (allAnswered / questions.length * 100) + '%';

  if (allAnswered === questions.length) {
    showFinal();
    return;
  }

  const body = document.getElementById('quiz-body');
  body.innerHTML = filtered.map((q, qi) => {
    const userAns = answered[q.idx];
    const isAnswered = userAns !== null;
    const cardCls = isAnswered ? (userAns === q.ans ? 'question-card answered-correct' : 'question-card answered-wrong') : 'question-card';

    const opts = q.opts.map((o, oi) => {
      let cls = 'option-btn';
      if (isAnswered) {
        if (oi === q.ans) cls += ' correct';
        else if (oi === userAns) cls += ' wrong';
      }
      return `<button class="${cls}" onclick="answer(${q.idx},${oi})" ${isAnswered ? 'disabled' : ''}>
        <span class="letter">${['A','B','C','D'][oi]}.</span> ${o}
      </button>`;
    }).join('');

    return `<div class="${cardCls}" id="qcard-${q.idx}">
      <div class="card-header">
        <div class="question-meta">Tema ${q.topic+1}: ${topics[q.topic]} · Pregunta ${qi+1}/10</div>
        <button class="menu-btn" onclick="openCorrection(${q.idx})" title="Corregir respuesta">⋯</button>
      </div>
      <div class="question-text">${qi+1}. ${q.q}</div>
      <div class="options">${opts}</div>
      <div class="explanation ${isAnswered ? 'show' : ''}" id="exp-${q.idx}">
        <b>💡 Explicación:</b> ${q.exp}
      </div>
    </div>`;
  }).join('');
  renderTopicNav();
}

function answer(idx, opt) {
  if (answered[idx] !== null) return;
  answered[idx] = opt;
  const q = questions[idx];
  if (opt === q.ans) topicScores[q.topic].correct++;
  topicScores[q.topic].total++;

  // Auto advance to next topic if all current answered
  const filtered = getFilteredQuestions();
  const doneAll = filtered.every(fq => answered[fq.idx] !== null);

  renderQuiz();

  if (doneAll) {
    const next = topics.findIndex((_, i) => i > currentTopic && questions.filter(q => q.topic === i).some((_, qi) => answered[questions.indexOf(questions.filter(q => q.topic === i)[qi])] === null));
    if (next !== -1) {
      setTimeout(() => {
        currentTopic = next;
        renderQuiz();
        window.scrollTo({top: 0, behavior: 'smooth'});
      }, 600);
    }
  }
}

function openCorrection(idx) {
  const q = questions[idx];
  document.getElementById('correction-question-preview').textContent = q.q.length > 80 ? q.q.slice(0,80)+'…' : q.q;
  document.getElementById('correction-opts').innerHTML = q.opts.map((o, oi) => {
    const isCurrent = oi === q.ans;
    return `<button class="correction-opt ${isCurrent ? 'current-correct' : ''}" onclick="applyCorrection(${idx},${oi})">
      <span class="opt-letter">${['A','B','C','D'][oi]}.</span>
      <span>${o}${isCurrent ? ' ✓ (actual)' : ''}</span>
    </button>`;
  }).join('');
  document.getElementById('correction-overlay').classList.add('open');
}

function closeCorrection(e) {
  if (e && e.target !== document.getElementById('correction-overlay')) return;
  document.getElementById('correction-overlay').classList.remove('open');
}

function applyCorrection(idx, newAns) {
  const q = questions[idx];
  const oldAns = q.ans;
  if (newAns === oldAns) { document.getElementById('correction-overlay').classList.remove('open'); return; }

  // Recalculate score if question already answered
  const userAns = answered[idx];
  if (userAns !== null) {
    const wasCorrect = userAns === oldAns;
    const isNowCorrect = userAns === newAns;
    if (wasCorrect && !isNowCorrect) topicScores[q.topic].correct--;
    if (!wasCorrect && isNowCorrect) topicScores[q.topic].correct++;
  }

  questions[idx].ans = newAns;
  document.getElementById('correction-overlay').classList.remove('open');
  renderQuiz();
}

function switchTopic(t) {
  currentTopic = t;
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function showFinal() {
  document.getElementById('quiz-body').innerHTML = '';
  const fs = document.getElementById('final-screen');
  fs.style.display = 'block';

  const total = questions.length;
  const correct = answered.reduce((s, a, i) => a === questions[i].ans ? s+1 : s, 0);
  const pct = Math.round(correct/total*100);

  document.getElementById('final-pct').textContent = `${correct}/${total} (${pct}%)`;
  const msg = pct >= 90 ? '¡Excelente! Estás listo para el concurso.' :
              pct >= 70 ? 'Muy bien. Repasa los temas con menor puntaje.' :
              pct >= 50 ? 'Bien encaminado. Refuerza las áreas débiles.' : 'Continúa estudiando. ¡Tú puedes!';
  document.getElementById('final-msg').textContent = msg;

  const tr = document.getElementById('topic-results');
  tr.innerHTML = '<h3 style="margin-bottom:12px;color:var(--primary)">Resultados por Tema</h3>' +
    topicScores.map((s, i) => {
      const pct = s.total ? Math.round(s.correct/s.total*100) : 0;
      const color = pct >= 70 ? 'var(--correct)' : pct >= 50 ? 'orange' : 'var(--wrong)';
      return `<div class="topic-result-row">
        <span style="flex:1;font-weight:600">${i+1}. ${topics[i]}</span>
        <span style="color:${color};font-weight:700;margin:0 12px">${s.correct}/${s.total}</span>
        <div class="mini-bar-wrap"><div class="mini-bar" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
}

function restart() {
  answered = new Array(questions.length).fill(null);
  topicScores = topics.map(() => ({ correct: 0, total: 0 }));
  currentTopic = 0;
  document.getElementById('final-screen').style.display = 'none';
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
</script>
</body>
</html>
